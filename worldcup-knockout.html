<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 世界杯赛程看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06142c;
      --bg2: #071d3a;
      --panel: rgba(9, 30, 61, .92);
      --panel2: rgba(13, 43, 82, .82);
      --card: rgba(255, 255, 255, .075);
      --card2: rgba(255, 255, 255, .115);
      --line: rgba(255, 255, 255, .15);
      --line2: rgba(246, 199, 89, .72);
      --text: #f5f8ff;
      --muted: #9aaecb;
      --muted2: #72849d;
      --gold: #f6c759;
      --gold2: #ffe8aa;
      --green: #2ac075;
      --red: #ff4261;
      --gray: #65748a;
      --shadow: 0 22px 70px rgba(0, 0, 0, .35);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 0%, rgba(246, 199, 89, .18), transparent 32%),
        radial-gradient(circle at 88% 10%, rgba(42, 192, 117, .15), transparent 28%),
        linear-gradient(135deg, #020817, var(--bg) 52%, #06271e);
      color: var(--text);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    button { font: inherit; color: inherit; }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,.11), rgba(255,255,255,.035));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
      color: var(--gold2);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(42, 192, 117, .17);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 820px;
      margin: 12px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .chip,
    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted);
      white-space: nowrap;
      backdrop-filter: blur(14px);
    }

    .chip strong { color: var(--text); }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted2);
    }

    .dot.ok { background: var(--green); box-shadow: 0 0 12px rgba(42,192,117,.7); }
    .dot.bad { background: var(--red); box-shadow: 0 0 12px rgba(255,66,97,.6); }

    .btn {
      border-color: transparent;
      background: linear-gradient(135deg, var(--gold), #d79b2d);
      color: #091a32;
      font-weight: 900;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .tab {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--gold), #d99e31);
      color: #07162d;
      box-shadow: 0 12px 30px rgba(246,199,89,.18);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 16px;
      color: var(--muted);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), rgba(5, 18, 40, .9));
      box-shadow: var(--shadow);
    }

    .panel-head {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(246,199,89,.1), rgba(255,255,255,.025));
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .panel-title svg {
      width: 21px;
      height: 21px;
      color: var(--gold);
      flex: 0 0 auto;
    }

    .panel h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 950;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-body { padding: 16px; }

    .view { display: none; }
    .view.active { display: block; }

    .day-group + .day-group { margin-top: 16px; }

    .day-title {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin: 0 0 10px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--gold2);
      font-size: 13px;
      font-weight: 900;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .match-card,
    .stat-card,
    .detail-card {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--card);
    }

    .match-card {
      padding: 13px;
      display: grid;
      gap: 9px;
    }

    .match-top,
    .team-row,
    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stage,
    .time,
    .venue,
    .score-detail {
      color: var(--muted);
      font-size: 12px;
    }

    .team {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 850;
    }

    .team span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .flag {
      width: 26px;
      height: 18px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
    }

    .score {
      color: var(--gold2);
      font-size: 19px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .status.live { background: var(--red); color: #fff; animation: pulse 1.6s infinite; }
    .status.done { background: var(--gray); color: #fff; }
    .status.todo { background: rgba(255,255,255,.08); color: #d8e3f3; border: 1px solid var(--line); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,66,97,.36); }
      50% { box-shadow: 0 0 0 7px rgba(255,66,97,0); }
    }

    .bracket-area {
      position: relative;
      min-height: 680px;
      overflow: auto;
    }

    .bracket-stage-labels {
      position: relative;
      z-index: 2;
      min-width: 1120px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
      margin-bottom: 12px;
    }

    .bracket-stage-labels div {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--gold2);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .bracket-canvas {
      position: relative;
      min-width: 1120px;
      min-height: 620px;
    }

    .bracket-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .bracket-match {
      position: absolute;
      width: 170px;
      min-height: 106px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.08);
      cursor: pointer;
      transition: border-color .15s ease, transform .15s ease, background .15s ease;
    }

    .bracket-match:hover {
      transform: translateY(-1px);
      border-color: var(--line2);
      background: rgba(255,255,255,.12);
    }

    .bracket-match.advanced {
      border-color: var(--line2);
      box-shadow: 0 0 0 1px rgba(246,199,89,.18), 0 0 22px rgba(246,199,89,.13);
    }

    .bracket-team {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 32px;
      padding: 6px;
      border-radius: 9px;
    }

    .bracket-team.win {
      background: linear-gradient(135deg, rgba(246,199,89,.18), rgba(42,192,117,.12));
    }

    .bracket-team.lose {
      opacity: .55;
      filter: grayscale(.25);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 14px;
    }

    .stat-card h3 {
      margin: 0 0 12px;
      color: var(--gold2);
      font-size: 14px;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-row {
      color: var(--muted);
      font-size: 13px;
    }

    .rank-row strong {
      color: var(--gold2);
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      margin-top: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
    }

    .empty {
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--muted2);
      text-align: center;
      filter: grayscale(.1);
    }

    .empty-icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      color: rgba(246,199,89,.55);
    }

    .empty-icon svg {
      width: 38px;
      height: 38px;
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: rgba(245,248,255,.68);
      font-size: 16px;
      font-weight: 950;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(1, 8, 20, .68);
      backdrop-filter: blur(10px);
    }

    .modal.show { display: grid; }

    .detail-card {
      width: min(520px, 100%);
      padding: 18px;
      background: linear-gradient(180deg, var(--panel), #06162f);
      box-shadow: var(--shadow);
    }

    .detail-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .detail-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .toolbar { justify-content: stretch; }
      .chip, .btn { flex: 1 1 auto; justify-content: center; }
      .schedule-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .bracket-area { min-height: 0; }
      .bracket-stage-labels { display: none; }
      .bracket-canvas {
        min-width: 0;
        min-height: 0;
        display: grid;
        gap: 12px;
      }
      .bracket-svg { display: none; }
      .bracket-match {
        position: static;
        width: auto;
      }
    }

    @media (max-width: 620px) {
      .app { padding: 14px; }
      .tabs { grid-template-columns: 1fr; }
      .panel-head { align-items: flex-start; flex-direction: column; }
      .empty { min-height: 240px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <section>
        <div class="eyebrow">World Cup 2026 Dashboard</div>
        <h1>2026 世界杯赛程看板</h1>
        <p class="subtitle">原生 HTML/CSS/JS · Netlify Functions 代理 football-data.org v4 · 本地时区展示 · 自动缓存与容错</p>
      </section>
      <div class="toolbar">
        <div class="chip"><span id="netDot" class="dot"></span><span id="netText">等待同步</span></div>
        <div class="chip">时区 <strong id="tzText">-</strong></div>
        <button id="refreshBtn" class="btn" type="button">刷新数据</button>
      </div>
    </header>

    <nav class="tabs" aria-label="看板切换">
      <button class="tab active" data-tab="schedule" type="button">赛程日历</button>
      <button class="tab" data-tab="bracket" type="button">淘汰赛对阵</button>
      <button class="tab" data-tab="stats" type="button">数据统计</button>
    </nav>

    <div class="meta-row">
      <span id="updatedAt">最后更新时间：尚未同步</span>
    </div>

    <section id="scheduleView" class="view active">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <h2>赛程日历</h2>
          </div>
          <span id="scheduleCount">0 场</span>
        </div>
        <div id="scheduleList" class="panel-body"></div>
      </div>
    </section>

    <section id="bracketView" class="view">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h4v5H7zM13 15h4v5h-4zM13 4h4v5h-4zM7 15h4v5H7zM11 6h2M9 9v6M15 9v6M11 17h2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <h2>淘汰赛对阵</h2>
          </div>
          <span>SVG 树状图 · 点击查看详情</span>
        </div>
        <div id="bracketArea" class="panel-body bracket-area"></div>
      </div>
    </section>

    <section id="statsView" class="view">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19V5M8 17v-6M13 17V7M18 17v-9M3 19h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <h2>数据统计</h2>
          </div>
          <span>射手榜 / 球队进球 / 爆冷场次</span>
        </div>
        <div id="statsPanel" class="panel-body"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <div id="modal" class="modal" role="dialog" aria-modal="true">
    <article class="detail-card">
      <div class="detail-head">
        <div>
          <h3 id="modalTitle">比赛详情</h3>
          <div id="modalMeta" class="venue"></div>
        </div>
        <button id="modalClose" class="close" type="button" aria-label="关闭">×</button>
      </div>
      <div id="modalBody"></div>
    </article>
  </div>

  <script>
    const DATA_URL = location.protocol === "file:"
      ? "http://127.0.0.1:8765/api/fixtures"
      : "/api/fixtures";
    const CACHE_KEY = "wc26:dashboard:v2";
    const CACHE_TTL = 30 * 60 * 1000;
    const REFRESH_INTERVAL = 10 * 60 * 1000;

    const footballStageMap = {
      LAST_32: "1/16决赛",
      ROUND_OF_32: "1/16决赛",
      LAST_16: "1/8决赛",
      ROUND_OF_16: "1/8决赛",
      QUARTER_FINALS: "1/4决赛",
      SEMI_FINALS: "半决赛",
      THIRD_PLACE: "三四名决赛",
      FINAL: "决赛"
    };

    const stages = [
      { name: "1/16决赛", expected: 16 },
      { name: "1/8决赛", expected: 8 },
      { name: "1/4决赛", expected: 4 },
      { name: "半决赛", expected: 2 },
      { name: "三四名决赛", expected: 1 },
      { name: "决赛", expected: 1 }
    ];

    const statusMap = {
      SCHEDULED: "todo",
      TIMED: "todo",
      IN_PLAY: "live",
      PAUSED: "live",
      LIVE: "live",
      FINISHED: "done",
      AWARDED: "done",
      POSTPONED: "todo",
      SUSPENDED: "todo",
      CANCELLED: "todo"
    };

    const teamNames = {
      Argentina: "阿根廷", Australia: "澳大利亚", Belgium: "比利时", Brazil: "巴西", Canada: "加拿大",
      Croatia: "克罗地亚", Denmark: "丹麦", England: "英格兰", France: "法国", Germany: "德国",
      Japan: "日本", "Korea Republic": "韩国", Mexico: "墨西哥", Morocco: "摩洛哥", Netherlands: "荷兰",
      Portugal: "葡萄牙", Senegal: "塞内加尔", Spain: "西班牙", Switzerland: "瑞士", USA: "美国",
      "United States": "美国", Uruguay: "乌拉圭"
    };

    const flagCodes = {
      阿根廷: "AR", 澳大利亚: "AU", 比利时: "BE", 巴西: "BR", 加拿大: "CA", 克罗地亚: "HR",
      丹麦: "DK", 英格兰: "GB-ENG", 法国: "FR", 德国: "DE", 日本: "JP", 韩国: "KR",
      墨西哥: "MX", 摩洛哥: "MA", 荷兰: "NL", 葡萄牙: "PT", 塞内加尔: "SN", 西班牙: "ES",
      瑞士: "CH", 美国: "US", 乌拉圭: "UY"
    };

    const venues = [
      ["梅赛德斯-奔驰体育场", "亚特兰大"], ["BC Place", "温哥华"], ["吉列体育场", "波士顿"],
      ["AT&T 体育场", "达拉斯"], ["NRG 体育场", "休斯敦"], ["SoFi 体育场", "洛杉矶"],
      ["阿兹特克体育场", "墨西哥城"], ["大都会人寿体育场", "纽约/新泽西"]
    ];

    const state = {
      matches: [],
      rawMatches: [],
      activeTab: "schedule",
      lastUpdated: null,
      emptyReason: "",
      timer: null
    };

    const els = {
      netDot: document.querySelector("#netDot"),
      netText: document.querySelector("#netText"),
      tzText: document.querySelector("#tzText"),
      updatedAt: document.querySelector("#updatedAt"),
      refreshBtn: document.querySelector("#refreshBtn"),
      scheduleCount: document.querySelector("#scheduleCount"),
      scheduleList: document.querySelector("#scheduleList"),
      bracketArea: document.querySelector("#bracketArea"),
      statsPanel: document.querySelector("#statsPanel"),
      toast: document.querySelector("#toast"),
      modal: document.querySelector("#modal"),
      modalTitle: document.querySelector("#modalTitle"),
      modalMeta: document.querySelector("#modalMeta"),
      modalBody: document.querySelector("#modalBody"),
      modalClose: document.querySelector("#modalClose")
    };

    init();

    function init() {
      els.tzText.textContent = localTimezone();
      bindEvents();
      renderLoading();
      const cached = readCache();
      if (cached) {
        applyPayload(cached.payload, true);
        showToast("已载入本地缓存，正在同步最新数据。");
      }
      refresh(Boolean(cached));
      state.timer = window.setInterval(() => refresh(true), REFRESH_INTERVAL);
    }

    function bindEvents() {
      document.querySelector(".tabs").addEventListener("click", event => {
        const button = event.target.closest(".tab");
        if (!button) return;
        state.activeTab = button.dataset.tab;
        document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab === button));
        document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
        document.querySelector(`#${state.activeTab}View`).classList.add("active");
      });
      els.refreshBtn.addEventListener("click", () => refresh(false));
      els.bracketArea.addEventListener("click", event => {
        const card = event.target.closest(".bracket-match");
        if (!card) return;
        const match = state.matches.find(item => item.id === card.dataset.id);
        if (match) openDetail(match);
      });
      els.modalClose.addEventListener("click", closeDetail);
      els.modal.addEventListener("click", event => {
        if (event.target === els.modal) closeDetail();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape") closeDetail();
      });
    }

    function renderLoading() {
      const loading = emptyState("正在同步", "正在连接 football-data.org v4 数据源。");
      els.scheduleList.innerHTML = loading;
      els.bracketArea.innerHTML = loading;
      els.statsPanel.innerHTML = loading;
    }

    async function refresh(silent) {
      setNetwork("", "正在同步");
      try {
        const payload = await fetchFootballData();
        if (!payload.ok) throw new Error(payload.error || "football-data.org 数据请求失败。");
        writeCache(payload);
        applyPayload(payload, false);
        setNetwork("ok", state.matches.length ? "数据已同步" : "暂无淘汰赛");
        if (!silent) showToast("赛程数据已同步。");
      } catch (error) {
        const cached = readCache(true);
        if (cached && !state.rawMatches.length) applyPayload(cached.payload, true);
        setNetwork("bad", "更新受限");
        if (!state.rawMatches.length) {
          state.matches = [];
          state.emptyReason = friendlyError(error);
          state.lastUpdated = new Date();
          renderAll();
          updateTimestamp();
        }
        if (!silent) showToast(friendlyError(error));
      }
    }

    async function fetchFootballData() {
      const url = new URL(DATA_URL, window.location.href);
      url.searchParams.set("_", Date.now());
      const response = await fetch(url.toString(), {
        cache: "no-store",
        headers: { "Cache-Control": "no-cache" }
      });
      if (response.status === 429) throw new Error("football-data.org 接口限流，请稍后重试。");
      if (!response.ok) throw new Error(`网络请求失败，HTTP ${response.status}`);
      return response.json();
    }

    function applyPayload(payload, fromCache) {
      state.rawMatches = payload.matches || [];
      const knockout = state.rawMatches.filter(match => footballStageMap[match.stage]);
      state.matches = normalizeMatches(knockout);
      state.emptyReason = state.matches.length ? "" : "小组赛进行中，暂无淘汰赛赛事。";
      state.lastUpdated = fromCache ? new Date(payload.cachedAt || Date.now()) : new Date();
      renderAll();
      updateTimestamp(fromCache);
    }

    function normalizeMatches(matches) {
      return matches.map((match, index) => {
        const stage = footballStageMap[match.stage];
        const venue = match.venue ? [match.venue, match.area?.name || "城市待定"] : venues[index % venues.length];
        return {
          id: String(match.id || `${stage}-${index}`),
          stage,
          utcDate: match.utcDate || "",
          status: statusMap[match.status] || "todo",
          home: normalizeTeam(match.homeTeam),
          away: normalizeTeam(match.awayTeam),
          homeScore: displayScore(match.score, "home"),
          awayScore: displayScore(match.score, "away"),
          score: scoreParts(match.score),
          winner: match.score?.winner || null,
          venue: venue[0],
          city: venue[1],
          events: normalizeEvents(match.events || [], match)
        };
      }).sort((a, b) => {
        const stageDiff = stageIndex(a.stage) - stageIndex(b.stage);
        if (stageDiff) return stageDiff;
        return (Date.parse(a.utcDate) || 0) - (Date.parse(b.utcDate) || 0);
      });
    }

    function renderAll() {
      renderSchedule();
      renderBracket();
      renderStats();
    }

    function renderSchedule() {
      els.scheduleCount.textContent = `${state.matches.length} 场`;
      if (!state.matches.length) {
        els.scheduleList.innerHTML = emptyState("赛程日历", state.emptyReason || "小组赛进行中，暂无淘汰赛赛事。");
        return;
      }
      els.scheduleList.innerHTML = groupByDay(state.matches).map(group => `
        <section class="day-group">
          <h3 class="day-title">${escapeHtml(group.day)}</h3>
          <div class="schedule-grid">
            ${group.matches.map(renderScheduleCard).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderScheduleCard(match) {
      return `
        <article class="match-card">
          <div class="match-top">
            <span class="stage">${escapeHtml(match.stage)}</span>
            ${statusBadge(match.status)}
          </div>
          <div class="time">${escapeHtml(formatLocalTime(match.utcDate))}</div>
          <div class="team-row">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
          <div class="team-row">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
          <div class="venue">${escapeHtml(match.venue)} · ${escapeHtml(match.city)}</div>
        </article>
      `;
    }

    function renderBracket() {
      if (!state.matches.length) {
        els.bracketArea.innerHTML = emptyState("淘汰赛对阵", "小组赛结束后自动生成 SVG 树状对阵。");
        return;
      }
      const layout = bracketLayout(state.matches);
      els.bracketArea.innerHTML = `
        <div class="bracket-stage-labels">${stages.map(stage => `<div>${escapeHtml(stage.name)}</div>`).join("")}</div>
        <div class="bracket-canvas" style="height:${layout.height}px">
          <svg class="bracket-svg" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="none">
            ${layout.lines.map(line => `<path d="${line.d}" fill="none" stroke="${line.active ? "var(--gold)" : "rgba(255,255,255,.18)"}" stroke-width="${line.active ? 3 : 2}" stroke-linecap="round"/>`).join("")}
          </svg>
          ${layout.nodes.map(item => renderBracketNode(item.match, item)).join("")}
        </div>
      `;
    }

    function renderBracketNode(match, item) {
      const homeWin = match.winner === "HOME_TEAM";
      const awayWin = match.winner === "AWAY_TEAM";
      return `
        <article class="bracket-match ${match.winner ? "advanced" : ""}" data-id="${escapeHtml(match.id)}" style="left:${item.x}px;top:${item.y}px">
          <div class="bracket-time"><span>${escapeHtml(match.stage)}</span><span>${escapeHtml(shortTime(match.utcDate))}</span></div>
          <div class="bracket-team ${homeWin ? "win" : awayWin ? "lose" : ""}">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
          <div class="bracket-team ${awayWin ? "win" : homeWin ? "lose" : ""}">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
        </article>
      `;
    }

    function bracketLayout(matches) {
      const width = 1120;
      const cardW = 170;
      const cardH = 106;
      const colGap = (width - cardW) / Math.max(1, stages.length - 1);
      const nodes = [];
      for (const stage of stages) {
        const stageMatches = matches.filter(match => match.stage === stage.name);
        const col = stageIndex(stage.name);
        const gap = Math.max(122, 620 / Math.max(1, stageMatches.length));
        stageMatches.forEach((match, index) => {
          nodes.push({
            match,
            x: Math.round(col * colGap),
            y: Math.round(index * gap + 8),
            centerX: Math.round(col * colGap + cardW),
            centerY: Math.round(index * gap + 8 + cardH / 2)
          });
        });
      }
      const nodeByMatch = new Map(nodes.map(node => [node.match.id, node]));
      const lines = [];
      for (const node of nodes) {
        const winner = winnerName(node.match);
        if (!winner || node.match.stage === "决赛" || node.match.stage === "三四名决赛") continue;
        const target = matches.find(match => stageIndex(match.stage) === stageIndex(node.match.stage) + 1 && [match.home, match.away].includes(winner));
        if (!target) continue;
        const targetNode = nodeByMatch.get(target.id);
        if (!targetNode) continue;
        const x1 = node.x + cardW;
        const y1 = node.y + cardH / 2;
        const x2 = targetNode.x;
        const y2 = targetNode.y + cardH / 2;
        const mid = x1 + Math.max(24, (x2 - x1) / 2);
        lines.push({ active: true, d: `M${x1},${y1} C${mid},${y1} ${mid},${y2} ${x2},${y2}` });
      }
      const height = Math.max(620, ...nodes.map(node => node.y + cardH + 20));
      return { width, height, nodes, lines };
    }

    function renderStats() {
      if (!state.matches.length) {
        els.statsPanel.innerHTML = emptyState("数据统计", "赛事开始后解锁射手榜、球队进球与爆冷场次。");
        return;
      }
      const scorers = scorerRows(state.matches);
      const goals = teamGoalRows(state.matches);
      const upsets = upsetRows(state.matches);
      els.statsPanel.innerHTML = `
        <div class="stats-grid">
          <section class="stat-card"><h3>射手榜</h3>${rankList(scorers, "球")}</section>
          <section class="stat-card"><h3>球队进球</h3>${rankList(goals, "球")}</section>
          <section class="stat-card"><h3>爆冷场次</h3>${rankList(upsets, "净胜")}</section>
        </div>
      `;
    }

    function rankList(rows, suffix) {
      const safeRows = rows.length ? rows : [{ label: "等待官方数据", value: 0 }];
      const max = Math.max(1, ...safeRows.map(row => row.value));
      return `<div class="rank-list">${safeRows.map(row => `
        <div>
          <div class="rank-row"><span>${escapeHtml(row.label)}</span><strong>${escapeHtml(row.value)} ${escapeHtml(suffix)}</strong></div>
          <div class="bar"><span style="width:${Math.max(5, row.value / max * 100)}%"></span></div>
        </div>
      `).join("")}</div>`;
    }

    function scorerRows(matches) {
      const map = new Map();
      for (const match of matches) {
        for (const event of match.events) {
          if (!event.type.includes("进球") || !event.player) continue;
          const label = `${event.player} · ${event.team}`;
          map.set(label, (map.get(label) || 0) + 1);
        }
      }
      return Array.from(map, ([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value).slice(0, 8);
    }

    function teamGoalRows(matches) {
      const map = new Map();
      for (const match of matches) {
        map.set(match.home, (map.get(match.home) || 0) + numericScore(match.homeScore));
        map.set(match.away, (map.get(match.away) || 0) + numericScore(match.awayScore));
      }
      return Array.from(map, ([label, value]) => ({ label, value }))
        .filter(row => row.label !== "待定")
        .sort((a, b) => b.value - a.value)
        .slice(0, 8);
    }

    function upsetRows(matches) {
      return matches
        .filter(match => match.status === "done")
        .map(match => ({
          label: `${match.home} ${plainScore(match.homeScore)}-${plainScore(match.awayScore)} ${match.away}`,
          value: Math.abs(plainScore(match.homeScore) - plainScore(match.awayScore))
        }))
        .filter(row => row.value > 0)
        .sort((a, b) => b.value - a.value)
        .slice(0, 8);
    }

    function openDetail(match) {
      els.modalTitle.textContent = `${match.home} vs ${match.away}`;
      els.modalMeta.textContent = `${match.stage} · ${formatLocalTime(match.utcDate)} · ${match.venue} · ${match.city}`;
      els.modalBody.innerHTML = `
        <div class="match-card">
          <div class="team-row">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
          <div class="team-row">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
          <div class="venue">状态：${statusText(match.status)}</div>
        </div>
      `;
      els.modal.classList.add("show");
    }

    function closeDetail() {
      els.modal.classList.remove("show");
    }

    function groupByDay(matches) {
      const map = new Map();
      for (const match of matches) {
        const day = formatLocalDay(match.utcDate);
        if (!map.has(day)) map.set(day, []);
        map.get(day).push(match);
      }
      return Array.from(map, ([day, dayMatches]) => ({ day, matches: dayMatches }));
    }

    function emptyState(title, text) {
      return `
        <div class="empty">
          <div>
            <div class="empty-icon">${emptyIcon()}</div>
            <strong>${escapeHtml(title)}</strong>
            <span>${escapeHtml(text)}</span>
          </div>
        </div>
      `;
    }

    function emptyIcon() {
      return `<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M5 12h14M12 3c2.6 2.6 4 5.6 4 9s-1.4 6.4-4 9M12 3c-2.6 2.6-4 5.6-4 9s1.4 6.4 4 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
    }

    function statusBadge(status) {
      return `<span class="status ${status}">${escapeHtml(statusText(status))}</span>`;
    }

    function statusText(status) {
      return status === "live" ? "LIVE" : status === "done" ? "已结束" : "未开赛";
    }

    function teamMarkup(name) {
      return `<span class="team">${flagSvg(name)}<span>${escapeHtml(name)}</span></span>`;
    }

    function flagSvg(name) {
      const colors = flagPalette(flagCodes[name] || "");
      return `<svg class="flag" viewBox="0 0 30 20" role="img" aria-label="${escapeHtml(name)}国旗"><rect width="30" height="20" fill="${colors[0]}"/><rect y="6.66" width="30" height="6.68" fill="${colors[1]}"/><rect y="13.34" width="30" height="6.66" fill="${colors[2]}"/></svg>`;
    }

    function flagPalette(code) {
      const palettes = {
        AR: ["#75aadb", "#fff", "#75aadb"], AU: ["#012169", "#fff", "#e4002b"], BE: ["#000", "#fae042", "#ed2939"],
        BR: ["#009b3a", "#ffdf00", "#002776"], CA: ["#d52b1e", "#fff", "#d52b1e"], HR: ["#f00", "#fff", "#171796"],
        DK: ["#c60c30", "#fff", "#c60c30"], "GB-ENG": ["#fff", "#cf142b", "#fff"], FR: ["#0055a4", "#fff", "#ef4135"],
        DE: ["#000", "#dd0000", "#ffce00"], JP: ["#fff", "#bc002d", "#fff"], KR: ["#fff", "#cd2e3a", "#0047a0"],
        MX: ["#006847", "#fff", "#ce1126"], MA: ["#c1272d", "#006233", "#c1272d"], NL: ["#ae1c28", "#fff", "#21468b"],
        PT: ["#006600", "#ff0000", "#ffcc00"], SN: ["#00853f", "#fdef42", "#e31b23"], ES: ["#aa151b", "#f1bf00", "#aa151b"],
        CH: ["#d52b1e", "#fff", "#d52b1e"], US: ["#b22234", "#fff", "#3c3b6e"], UY: ["#fff", "#0038a8", "#fcd116"]
      };
      return palettes[code] || ["#d7dee9", "#f8fafc", "#aab7c8"];
    }

    function normalizeTeam(team) {
      const name = team?.shortName || team?.name || "待定";
      if (name === "TBD" || name === "To Be Determined") return "待定";
      return teamNames[name] || name;
    }

    function scoreParts(score) {
      return {
        regular: [scoreValue(score?.fullTime?.home ?? score?.regularTime?.home), scoreValue(score?.fullTime?.away ?? score?.regularTime?.away)],
        extra: [scoreValue(score?.extraTime?.home), scoreValue(score?.extraTime?.away)],
        penalties: [scoreValue(score?.penalties?.home), scoreValue(score?.penalties?.away)]
      };
    }

    function displayScore(score, side) {
      const regular = scoreValue(score?.fullTime?.[side] ?? score?.regularTime?.[side]);
      const penalty = scoreValue(score?.penalties?.[side]);
      return penalty === "-" ? regular : `${regular} (${penalty})`;
    }

    function scoreDetail(match) {
      const parts = [`常规 ${match.score.regular[0]}-${match.score.regular[1]}`];
      if (match.score.extra[0] !== "-" || match.score.extra[1] !== "-") parts.push(`加时 ${match.score.extra[0]}-${match.score.extra[1]}`);
      if (match.score.penalties[0] !== "-" || match.score.penalties[1] !== "-") parts.push(`点球 ${match.score.penalties[0]}-${match.score.penalties[1]}`);
      return parts.join(" · ");
    }

    function scoreValue(value) {
      return value === null || value === undefined ? "-" : String(value);
    }

    function numericScore(value) {
      const match = String(value).match(/^\d+/);
      return match ? Number(match[0]) : 0;
    }

    function plainScore(value) {
      return numericScore(value);
    }

    function winnerName(match) {
      if (match.winner === "HOME_TEAM") return match.home;
      if (match.winner === "AWAY_TEAM") return match.away;
      return "";
    }

    function stageIndex(name) {
      return Math.max(0, stages.findIndex(stage => stage.name === name));
    }

    function normalizeEvents(events, match) {
      return events.map((event, index) => ({
        minute: event.minute || event.time || index + 1,
        type: event.type || event.eventType || "事件",
        player: event.player?.name || event.player || "",
        team: normalizeTeam(event.team) || match.homeTeam?.shortName || ""
      }));
    }

    function formatLocalTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZoneName: "short"
      }).format(date);
    }

    function shortTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "待定";
      return new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).format(date);
    }

    function formatLocalDay(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", { month: "long", day: "numeric", weekday: "short" }).format(date);
    }

    function localTimezone() {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || "本地时区";
    }

    function updateTimestamp(fromCache) {
      const label = state.lastUpdated ? formatLocalTime(state.lastUpdated) : "尚未同步";
      els.updatedAt.textContent = `最后更新时间：${label}（${localTimezone()}${fromCache ? " · 缓存" : ""}）`;
    }

    function setNetwork(type, text) {
      els.netDot.className = `dot ${type === "ok" ? "ok" : type === "bad" ? "bad" : ""}`;
      els.netText.textContent = text;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.hidden = false;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.hidden = true;
      }, 4200);
    }

    function friendlyError(error) {
      const message = String(error?.message || error || "");
      if (message.includes("429") || message.includes("限流")) return "football-data.org 接口限流，稍后会自动重试。";
      if (message.includes("FOOTBALL_DATA_TOKEN")) return "Netlify 环境变量 FOOTBALL_DATA_TOKEN 未配置。";
      return "暂时无法获取实时数据，已显示缓存或空状态。";
    }

    function writeCache(payload) {
      const cached = { payload: { ...payload, cachedAt: Date.now() }, expires: Date.now() + CACHE_TTL };
      localStorage.setItem(CACHE_KEY, JSON.stringify(cached));
    }

    function readCache(ignoreExpiry) {
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
        if (!cached) return null;
        if (!ignoreExpiry && cached.expires < Date.now()) return null;
        return cached;
      } catch {
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
