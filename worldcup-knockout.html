<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 世界杯赛程看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06142c;
      --bg2: #071d3a;
      --panel: rgba(9, 30, 61, .92);
      --panel2: rgba(13, 43, 82, .82);
      --card: rgba(255, 255, 255, .075);
      --card2: rgba(255, 255, 255, .115);
      --line: rgba(255, 255, 255, .15);
      --line2: rgba(246, 199, 89, .72);
      --text: #f5f8ff;
      --muted: #9aaecb;
      --muted2: #72849d;
      --gold: #f6c759;
      --gold2: #ffe8aa;
      --green: #2ac075;
      --red: #ff4261;
      --gray: #65748a;
      --shadow: 0 22px 70px rgba(0, 0, 0, .35);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% -4%, rgba(42, 255, 151, .22), transparent 30%),
        radial-gradient(circle at 84% 10%, rgba(246, 199, 89, .13), transparent 28%),
        linear-gradient(135deg, #020713, #06142c 50%, #031a18);
      color: var(--text);
      font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    button { font: inherit; color: inherit; }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(42,255,151,.12), rgba(255,255,255,.035)),
        linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
      color: var(--gold2);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(42, 192, 117, .17);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 820px;
      margin: 12px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .chip,
    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted);
      white-space: nowrap;
      backdrop-filter: blur(14px);
    }

    .chip strong { color: var(--text); }

    .tz-select {
      max-width: 178px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-weight: 850;
      cursor: pointer;
    }

    .tz-select option {
      color: #091a32;
      background: #fff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted2);
    }

    .dot.ok { background: var(--green); box-shadow: 0 0 12px rgba(42,192,117,.7); }
    .dot.bad { background: var(--red); box-shadow: 0 0 12px rgba(255,66,97,.6); }

    .btn {
      border-color: transparent;
      background: linear-gradient(135deg, var(--gold), #d79b2d);
      color: #091a32;
      font-weight: 900;
      cursor: pointer;
      transition: transform .15s ease, filter .15s ease;
    }

    .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .tab {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--green), #b9ff67);
      color: #041611;
      box-shadow: 0 12px 30px rgba(42,192,117,.22), inset 0 0 0 1px rgba(255,255,255,.22);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 16px;
      color: var(--muted);
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), rgba(5, 18, 40, .9));
      box-shadow: var(--shadow);
    }

    .panel-head {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(246,199,89,.1), rgba(255,255,255,.025));
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .panel-title svg {
      width: 21px;
      height: 21px;
      color: var(--gold);
      flex: 0 0 auto;
    }

    .panel h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 950;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-body { padding: 16px; }

    .view { display: none; }
    .view.active { display: block; }

    .day-group + .day-group { margin-top: 16px; }

    .day-title {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      margin: 0 0 10px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--gold2);
      font-size: 13px;
      font-weight: 900;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .match-card,
    .stat-card,
    .detail-card {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--card);
    }

    .match-card {
      padding: 13px;
      display: grid;
      gap: 9px;
    }

    .broadcast-card {
      position: relative;
      overflow: hidden;
      min-height: 172px;
      padding: 14px;
      border-color: rgba(255,255,255,.16);
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.045)),
        linear-gradient(90deg, rgba(42,192,117,.08), rgba(246,199,89,.055));
      box-shadow: 0 18px 42px rgba(0,0,0,.24);
      backdrop-filter: blur(18px);
    }

    .broadcast-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-left: 4px solid var(--green);
      opacity: .9;
      pointer-events: none;
    }

    .broadcast-card.live {
      border-color: rgba(255,66,97,.58);
      box-shadow: 0 0 0 1px rgba(255,66,97,.18), 0 0 36px rgba(255,66,97,.18), var(--shadow);
      animation: cardPulse 1.8s ease-in-out infinite;
    }

    @keyframes cardPulse {
      0%, 100% { transform: translateY(0); filter: brightness(1); }
      50% { transform: translateY(-2px); filter: brightness(1.08); }
    }

    .broadcast-teams {
      display: grid;
      gap: 8px;
    }

    .broadcast-team {
      min-height: 48px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 7px 9px;
      border-radius: 12px;
      background: rgba(2, 10, 24, .35);
    }

    .broadcast-team.winner {
      background: linear-gradient(90deg, rgba(42,192,117,.2), rgba(246,199,89,.12));
      box-shadow: inset 0 0 0 1px rgba(42,255,151,.18);
    }

    .broadcast-team.loser {
      opacity: .42;
      filter: grayscale(.45);
    }

    .broadcast-score {
      min-width: 58px;
      text-align: right;
      color: #f8fff9;
      font-size: 38px;
      line-height: .9;
      font-weight: 1000;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(42,255,151,.32);
      font-variant-numeric: tabular-nums;
    }

    .broadcast-score.live-score {
      color: #fff;
      animation: scoreFlash 1.2s ease-in-out infinite;
    }

    @keyframes scoreFlash {
      0%, 100% { text-shadow: 0 0 14px rgba(42,255,151,.35); transform: scale(1); }
      50% { text-shadow: 0 0 26px rgba(42,255,151,.7); transform: scale(1.04); }
    }

    .match-top,
    .team-row,
    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .stage,
    .time,
    .venue,
    .score-detail {
      color: var(--muted);
      font-size: 12px;
    }

    .team {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 850;
    }

    .team span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .flag {
      width: 26px;
      height: 18px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px;
      background: rgba(255,255,255,.08);
    }

    .score {
      color: var(--gold2);
      font-size: 19px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .match-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 2px;
    }

    .live-link {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 11px;
      border: 1px solid rgba(42, 192, 117, .38);
      border-radius: 999px;
      background: rgba(42, 192, 117, .12);
      color: #c8ffe2;
      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
    }

    .live-link.live {
      border-color: rgba(255, 66, 97, .55);
      background: rgba(255, 66, 97, .16);
      color: #fff;
    }

    .live-link.disabled {
      pointer-events: none;
      color: var(--muted2);
      border-color: var(--line);
      background: rgba(255,255,255,.045);
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .status.live { background: var(--red); color: #fff; animation: pulse 1.6s infinite; }
    .status.done { background: var(--gray); color: #fff; }
    .status.todo { background: rgba(255,255,255,.08); color: #d8e3f3; border: 1px solid var(--line); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,66,97,.36); }
      50% { box-shadow: 0 0 0 7px rgba(255,66,97,0); }
    }

    .bracket-area {
      position: relative;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: contain;
    }

    .bracket-broadcast {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      min-height: min(780px, calc(100vh - 240px));
    }

    .bracket-scroll {
      height: min(780px, calc(100vh - 240px));
      min-height: 540px;
      overflow: auto;
      padding: 16px;
      border-right: 1px solid var(--line);
    }

    .bracket-scroll::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .bracket-scroll::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255,255,255,.2);
    }

    .bracket-stage-labels {
      position: relative;
      top: auto;
      z-index: 8;
      min-width: 1490px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 18px;
      margin-bottom: 0;
      padding: 0 0 14px;
      background: linear-gradient(180deg, rgba(8,27,57,.98), rgba(8,27,57,.86));
      box-shadow: 0 16px 24px rgba(2, 8, 20, .28);
    }

    .bracket-stage-labels div {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--gold2);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .bracket-canvas {
      position: relative;
      min-width: 1490px;
      min-height: 620px;
      margin-top: 22px;
    }

    .bracket-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
      filter: drop-shadow(0 0 10px rgba(42,255,151,.14));
    }

    .winner-path {
      filter: drop-shadow(0 0 5px rgba(42,255,151,.9)) drop-shadow(0 0 16px rgba(42,255,151,.5));
      animation: pathGlow 1.8s ease-in-out infinite;
    }

    @keyframes pathGlow {
      0%, 100% { opacity: .88; }
      50% { opacity: 1; }
    }

    .bracket-match {
      position: absolute;
      z-index: 2;
      width: 188px;
      min-height: 98px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,.08);
      cursor: pointer;
      transition: border-color .15s ease, transform .15s ease, background .15s ease;
    }

    .bracket-match:hover {
      transform: translateY(-1px);
      border-color: var(--line2);
      background: rgba(255,255,255,.12);
    }

    .bracket-match.advanced {
      border-color: rgba(42,255,151,.66);
      box-shadow: 0 0 0 1px rgba(42,255,151,.2), 0 0 28px rgba(42,255,151,.16);
    }

    .bracket-match.placeholder {
      color: var(--muted2);
      background: rgba(255,255,255,.045);
      border-style: dashed;
      filter: grayscale(.18);
    }

    .bracket-team {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 32px;
      padding: 6px;
      border-radius: 9px;
    }

    .bracket-team.win {
      background: linear-gradient(135deg, rgba(246,199,89,.18), rgba(42,192,117,.12));
    }

    .bracket-team.lose {
      opacity: .34;
      filter: grayscale(.55);
    }

    .bracket-note {
      position: sticky;
      left: 0;
      z-index: 4;
      width: fit-content;
      max-width: 520px;
      margin-bottom: 12px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-size: 12px;
    }

    .intel-panel {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(42,255,151,.11), transparent 32%),
        rgba(2, 10, 24, .38);
      backdrop-filter: blur(18px);
    }

    .intel-card {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.065);
      box-shadow: 0 16px 38px rgba(0,0,0,.2);
      overflow: hidden;
    }

    .intel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 13px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      color: var(--gold2);
      font-weight: 950;
    }

    .intel-body {
      display: grid;
      gap: 10px;
      padding: 12px 13px;
    }

    .meter-row {
      display: grid;
      gap: 6px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), #d5ff65);
      box-shadow: 0 0 16px rgba(42,255,151,.4);
    }

    .alert-row {
      padding: 10px;
      border: 1px solid rgba(255,66,97,.22);
      border-radius: 12px;
      background: rgba(255,66,97,.075);
      color: #ffd5dc;
      font-size: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat-tile {
      padding: 10px;
      border-radius: 12px;
      background: rgba(2,10,24,.35);
    }

    .stat-tile strong {
      display: block;
      color: #fff;
      font-size: 23px;
      line-height: 1;
    }

    .stat-tile span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat-card {
      padding: 14px;
    }

    .stat-card h3 {
      margin: 0 0 12px;
      color: var(--gold2);
      font-size: 14px;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-row {
      color: var(--muted);
      font-size: 13px;
    }

    .rank-row strong {
      color: var(--gold2);
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      margin-top: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--green));
    }

    .empty {
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--muted2);
      text-align: center;
      filter: grayscale(.1);
    }

    .empty-icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin: 0 auto 14px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      color: rgba(246,199,89,.55);
    }

    .empty-icon svg {
      width: 38px;
      height: 38px;
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: rgba(245,248,255,.68);
      font-size: 16px;
      font-weight: 950;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(1, 8, 20, .68);
      backdrop-filter: blur(10px);
    }

    .modal.show { display: grid; }

    .detail-card {
      width: min(760px, 100%);
      max-height: min(86vh, 760px);
      overflow: auto;
      padding: 18px;
      background: linear-gradient(180deg, var(--panel), #06162f);
      box-shadow: var(--shadow);
    }

    .detail-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .detail-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .close {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
    }

    .ai-panel {
      margin-top: 12px;
      padding: 14px;
      border: 1px solid rgba(246, 199, 89, .28);
      border-radius: 13px;
      background: linear-gradient(135deg, rgba(246,199,89,.1), rgba(42,192,117,.045));
    }

    .ai-head,
    .ai-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ai-head strong {
      color: var(--gold2);
      font-size: 15px;
    }

    .ai-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .ai-box {
      min-height: 88px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255,255,255,.055);
    }

    .ai-box span {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .ai-box p {
      margin: 0;
      color: #dce7f7;
      font-size: 13px;
    }

    .ai-action {
      min-height: 32px;
      padding: 0 11px;
      border: 1px solid rgba(246,199,89,.38);
      border-radius: 999px;
      background: rgba(246,199,89,.12);
      color: var(--gold2);
      font-weight: 900;
      cursor: pointer;
    }

    .ai-action:disabled {
      cursor: not-allowed;
      color: var(--muted2);

      沙特阿拉伯: "SA", 苏格兰: "GB-SCT", 塞内加尔: "SN", 塞尔维亚: "RS", 南非: "ZA", 西班牙: "ES",
      瑞典: "SE", 瑞士: "CH", 突尼斯: "TN", 土耳其: "TR", 美国: "US", 乌拉圭: "UY", 威尔士: "GB-WLS",
      乌克兰: "UA", 阿联酋: "AE", 玻利维亚: "BO", 委内瑞拉: "VE", 牙买加: "JM", 巴拿马: "PA",
      洪都拉斯: "HN", 科特迪瓦: "CI", 阿尔及利亚: "DZ", 马里: "ML", 民主刚果: "CD", 乌兹别克斯坦: "UZ",
      约旦: "JO", 伊拉克: "IQ", 印度尼西亚: "ID", 新西兰: "NZ", 待定: "TBD"

    const venues = [
      ["梅赛德斯-奔驰体育场", "亚特兰大"], ["BC Place", "温哥华"], ["吉列体育场", "波士顿"],
      ["AT&T 体育场", "达拉斯"], ["NRG 体育场", "休斯敦"], ["SoFi 体育场", "洛杉矶"],
      ["阿兹特克体育场", "墨西哥城"], ["大都会人寿体育场", "纽约/新泽西"]
    ];
    const state = {
      matches: [],
      feedMatches: [],
      bracketSlots: [],
      rawMatches: [],
      activeTab: "schedule",
      timeZone: localStorage.getItem("wc26:timezone") || "local",
      lastUpdated: null,
      emptyReason: "",
      timer: null
    };

    const els = {
      netDot: document.querySelector("#netDot"),
      netText: document.querySelector("#netText"),
      tzSelect: document.querySelector("#tzSelect"),
      updatedAt: document.querySelector("#updatedAt"),
      refreshBtn: document.querySelector("#refreshBtn"),
      scheduleCount: document.querySelector("#scheduleCount"),
      scheduleList: document.querySelector("#scheduleList"),
      bracketArea: document.querySelector("#bracketArea"),
      toast: document.querySelector("#toast"),
      modal: document.querySelector("#modal"),
      modalTitle: document.querySelector("#modalTitle"),
      modalMeta: document.querySelector("#modalMeta"),
      modalBody: document.querySelector("#modalBody"),
      modalClose: document.querySelector("#modalClose")
    };

    init();

    function init() {
      els.tzSelect.value = state.timeZone;
      bindEvents();
      renderLoading();
      const cached = readCache();
      if (cached) {
        applyPayload(cached.payload, true);
        showToast("已载入本地缓存，正在同步最新数据。");
      }
      refresh(Boolean(cached));
      state.timer = window.setInterval(() => refresh(true), REFRESH_INTERVAL);
    }

    function bindEvents() {
      document.querySelector(".tabs").addEventListener("click", event => {
        const button = event.target.closest(".tab");
        if (!button) return;
        state.activeTab = button.dataset.tab;
        document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab === button));
        document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));
        document.querySelector(`#${state.activeTab}View`).classList.add("active");
      });
      els.tzSelect.addEventListener("change", () => {
        state.timeZone = els.tzSelect.value;
        localStorage.setItem("wc26:timezone", state.timeZone);
        renderAll();
        updateTimestamp();
        showToast(`已切换至${timeZoneLabel()}。`);
      });
      els.refreshBtn.addEventListener("click", () => refresh(false));
      els.bracketArea.addEventListener("click", event => {
        const card = event.target.closest(".bracket-match");
        if (!card) return;
        const match = state.bracketSlots.find(item => item.id === card.dataset.id);
        if (match) openDetail(match);
      });
      document.addEventListener("click", event => {
        const button = event.target.closest("[data-ai-match]");
        if (!button) return;
        loadAiAnalysis(button.dataset.aiMatch);
      });
      els.modalClose.addEventListener("click", closeDetail);
      els.modal.addEventListener("click", event => {
        if (event.target === els.modal) closeDetail();
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape") closeDetail();
      });
      window.addEventListener("resize", debounce(() => {
        if (state.activeTab === "bracket") renderBracket();
      }, 120));
    }

    function renderLoading() {
      const loading = emptyState("正在同步", "正在连接 football-data.org v4 数据源。");
      els.scheduleList.innerHTML = loading;
      els.bracketArea.innerHTML = loading;
    }

    async function refresh(silent) {
      setNetwork("", "正在同步");
      try {
        const payload = await fetchFootballData();
        if (!payload.ok) throw new Error(payload.error || "football-data.org 数据请求失败。");
        writeCache(payload);
        applyPayload(payload, false);
        setNetwork("ok", state.matches.length ? "数据已同步" : "暂无淘汰赛");
        if (!silent) showToast("赛程数据已同步。");
      } catch (error) {
        const cached = readCache(true);
        if (cached && !state.rawMatches.length) applyPayload(cached.payload, true);
        setNetwork("bad", "更新受限");
        if (!state.rawMatches.length) {
          state.matches = [];
          state.emptyReason = friendlyError(error);
          state.lastUpdated = new Date();
          renderAll();
          updateTimestamp();
        }
        if (!silent) showToast(friendlyError(error));
      }
    }

    async function fetchFootballData() {
      const url = new URL(DATA_URL, window.location.href);
      url.searchParams.set("_", Date.now());
      const response = await fetch(url.toString(), {
        cache: "no-store",
        headers: { "Cache-Control": "no-cache" }
      });
      if (response.status === 429) throw new Error("football-data.org 接口限流，请稍后重试。");
      if (!response.ok) throw new Error(`网络请求失败，HTTP ${response.status}`);
      return response.json();
    }

    function applyPayload(payload, fromCache) {
      state.rawMatches = payload.matches || [];
      const knockout = state.rawMatches.filter(match => footballStageMap[match.stage]);
      state.matches = normalizeMatches(knockout);
      state.feedMatches = normalizeFeedMatches(state.rawMatches);
      state.emptyReason = state.matches.length ? "" : "小组赛进行中，暂无淘汰赛赛事。";
      state.lastUpdated = fromCache ? new Date(payload.cachedAt || Date.now()) : new Date();
      renderAll();
      updateTimestamp(fromCache);
    }
    function normalizeMatches(matches) {
      return matches.map((match, index) => {
        const stage = footballStageMap[match.stage];
        const venue = match.venue ? [match.venue, match.area?.name || "城市待定"] : venues[index % venues.length];
        return {
          id: String(match.id || `${stage}-${index}`),
          stage,
          utcDate: match.utcDate || "",
          status: statusMap[match.status] || "todo",
          home: normalizeTeam(match.homeTeam),
          away: normalizeTeam(match.awayTeam),
          homeScore: displayScore(match.score, "home"),
          awayScore: displayScore(match.score, "away"),
          score: scoreParts(match.score),
          winner: match.score?.winner || null,
          venue: venue[0],
          city: venue[1],
          events: normalizeEvents(match.events || [], match)
        };
      }).sort((a, b) => {
        const stageDiff = stageIndex(a.stage) - stageIndex(b.stage);
        if (stageDiff) return stageDiff;
        return (Date.parse(a.utcDate) || 0) - (Date.parse(b.utcDate) || 0);
      });
    }

    function normalizeFeedMatches(matches) {
      return (matches || []).map((match, index) => normalizeMatch(match, footballStageMap[match.stage] || match.group || `第 ${match.matchday || "-"} 比赛日`, index))
        .sort((a, b) => (Date.parse(a.utcDate) || 0) - (Date.parse(b.utcDate) || 0));
    }

    function normalizeMatch(match, stage, index) {
      const venue = match.venue ? [match.venue, match.area?.name || "城市待定"] : venues[index % venues.length];
      return {
        id: String(match.id || `${stage}-${index}`),
        stage,
        utcDate: match.utcDate || "",
        status: statusMap[match.status] || "todo",
        home: normalizeTeam(match.homeTeam),
        away: normalizeTeam(match.awayTeam),
        homeScore: displayScore(match.score, "home"),
        awayScore: displayScore(match.score, "away"),
        score: scoreParts(match.score),
        winner: match.score?.winner || null,
        venue: venue[0],
        city: venue[1],
        events: normalizeEvents(match.events || [], match)
      };
    }

    function renderAll() {
      renderSchedule();
      renderBracket();
    }

    function renderSchedule() {
      const feed = state.matches.length ? state.matches : state.feedMatches;
      els.scheduleCount.textContent = `${feed.length} 场`;
      if (!feed.length) {
        els.scheduleList.innerHTML = emptyState("赛程日历", state.emptyReason || "小组赛进行中，暂无淘汰赛赛事。");
        return;
      }
      els.scheduleList.innerHTML = groupByDay(feed).map(group => `
        <section class="day-group">
          <h3 class="day-title">${escapeHtml(group.day)}</h3>
          <div class="schedule-grid">
            ${group.matches.map(renderScheduleCard).join("")}
          </div>
        </section>
      `).join("");
    }
    function renderScheduleCard(match) {
      const homeWin = match.winner === "HOME_TEAM";
      const awayWin = match.winner === "AWAY_TEAM";
      return `
        <article class="match-card broadcast-card ${match.status === "live" ? "live" : ""}">
          <div class="match-top">
            <span class="stage">${escapeHtml(match.stage)}</span>
            ${statusBadge(match.status)}
          </div>
          <div class="time">${escapeHtml(formatLocalTime(match.utcDate))}</div>
          <div class="broadcast-teams">
            <div class="broadcast-team ${homeWin ? "winner" : awayWin ? "loser" : ""}">${teamMarkup(match.home)}<span class="broadcast-score ${match.status === "live" ? "live-score" : ""}">${escapeHtml(match.homeScore)}</span></div>
            <div class="broadcast-team ${awayWin ? "winner" : homeWin ? "loser" : ""}">${teamMarkup(match.away)}<span class="broadcast-score ${match.status === "live" ? "live-score" : ""}">${escapeHtml(match.awayScore)}</span></div>
          </div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
          <div class="venue">${escapeHtml(match.venue)} · ${escapeHtml(match.city)}</div>
          <div class="match-actions">${liveLink(match)}</div>
        </article>
      `;
    }

    function renderBracket() {
      const slots = bracketSlots(state.matches);
      state.bracketSlots = slots;
      const layout = bracketLayout(slots);
      const note = state.matches.length
        ? "点击任意比赛卡查看详情；晋级路径会随官方结果自动高亮。"
        : "小组赛结束后自动生成完整对阵；当前先展示淘汰赛槽位结构。";
      els.bracketArea.innerHTML = `
        <div class="bracket-broadcast">
          <div class="bracket-scroll">
            <div class="bracket-note">${escapeHtml(note)}</div>
            <div class="bracket-stage-labels" style="width:${layout.width}px">${stages.map(stage => `<div>${escapeHtml(stage.name)}</div>`).join("")}</div>
            <div class="bracket-canvas" style="width:${layout.width}px;height:${layout.height}px">
              <svg class="bracket-svg" aria-hidden="true"></svg>
              ${layout.nodes.map(item => renderBracketNode(item.match, item)).join("")}
            </div>
          </div>
          ${renderIntelPanel()}
        </div>
      `;
      requestAnimationFrame(drawBracketLines);
    }
    function renderBracketNode(match, item) {
      const homeWin = match.winner === "HOME_TEAM";
      const awayWin = match.winner === "AWAY_TEAM";
      return `
        <article class="bracket-match ${match.winner ? "advanced" : ""} ${match.placeholder ? "placeholder" : ""}" data-id="${escapeHtml(match.id)}" data-col="${item.col}" data-index="${item.index}" style="left:${item.x}px;top:${item.y}px">
          <div class="bracket-time"><span>${escapeHtml(match.slotLabel || match.stage)}</span><span>${escapeHtml(shortTime(match.utcDate))}</span></div>
          <div class="bracket-team ${homeWin ? "win" : awayWin ? "lose" : ""}">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
          <div class="bracket-team ${awayWin ? "win" : homeWin ? "lose" : ""}">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
        </article>
      `;
    }

    function bracketSlots(matches) {
      return stages.flatMap(stage => {
        const real = matches.filter(match => match.stage === stage.name);
        return Array.from({ length: stage.expected }, (_, index) => real[index] || placeholderMatch(stage.name, index));
      });
    }

    function placeholderMatch(stage, index) {
      return {
        id: `placeholder-${stage}-${index}`,
        stage,
        slotLabel: `${stage} ${String(index + 1).padStart(2, "0")}`,
        utcDate: "",
        status: "todo",
        home: "待定",
        away: "待定",
        homeScore: "-",
        awayScore: "-",
        score: { regular: ["-", "-"], extra: ["-", "-"], penalties: ["-", "-"] },
        winner: null,
        venue: "场馆待定",
        city: "城市待定",
        events: [],
        placeholder: true
      };
    }

    function bracketLayout(matches) {
      const cardW = 188;
      const cardH = 150;
      const colGap = 260;
      const sidePad = 18;
      const topPad = 18;
      const bottomPad = 28;
      const verticalGap = 30;
      const width = cardW + colGap * (stages.length - 1) + sidePad * 2;
      const maxRoundSize = Math.max(...stages.map(stage => matches.filter(match => match.stage === stage.name).length));
      const height = Math.max(760, topPad + bottomPad + maxRoundSize * cardH + Math.max(0, maxRoundSize - 1) * verticalGap);
      const nodes = [];
      for (const stage of stages) {
        const stageMatches = matches.filter(match => match.stage === stage.name);
        const col = stageIndex(stage.name);
        const available = height - topPad - bottomPad - cardH;
        const step = stageMatches.length > 1 ? available / (stageMatches.length - 1) : 0;
        stageMatches.forEach((match, index) => {
          // 每一轮只根据本轮卡片数量均分垂直空间，窗口变化时整体重算，避免重叠。
          const y = stageMatches.length > 1 ? topPad + index * step : (height - cardH) / 2;
          nodes.push({
            match,
            index,
            col,
            x: Math.round(sidePad + col * colGap),
            y: Math.round(y)
          });
        });
      }
      return { width, height, nodes };
    }

    function drawBracketLines() {
      const canvas = els.bracketArea.querySelector(".bracket-canvas");
      const svg = els.bracketArea.querySelector(".bracket-svg");
      if (!canvas || !svg) return;
      const canvasBox = canvas.getBoundingClientRect();
      const cards = Array.from(canvas.querySelectorAll(".bracket-match"));
      const byKey = new Map(cards.map(card => [`${card.dataset.col}:${card.dataset.index}`, card]));
      svg.setAttribute("viewBox", `0 0 ${canvas.scrollWidth} ${canvas.scrollHeight}`);
      svg.setAttribute("width", canvas.scrollWidth);
      svg.setAttribute("height", canvas.scrollHeight);
      svg.innerHTML = "";

      for (const card of cards) {
        const col = Number(card.dataset.col);
        const index = Number(card.dataset.index);
        if (stages[col]?.name === "决赛" || stages[col]?.name === "三四名决赛") continue;
        const target = byKey.get(`${col + 1}:${Math.floor(index / 2)}`);
        if (!target) continue;
        const from = edgePoint(card, canvasBox, "right");
        const to = edgePoint(target, canvasBox, "left");
        const mid = from.x + Math.max(34, (to.x - from.x) / 2);
        const match = state.bracketSlots.find(item => item.id === card.dataset.id);
        const targetMatch = state.bracketSlots.find(item => item.id === target.dataset.id);
        const winner = match ? winnerName(match) : "";
        const active = Boolean(winner && targetMatch && [targetMatch.home, targetMatch.away].includes(winner));
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M${from.x},${from.y} C${mid},${from.y} ${mid},${to.y} ${to.x},${to.y}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", active ? "var(--gold)" : "rgba(255,255,255,.18)");
        path.setAttribute("stroke-width", active ? "3" : "2");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("class", active ? "winner-path" : "bracket-path");
        svg.appendChild(path);
      }
    }

    function renderIntelPanel() {
      const feed = state.feedMatches.length ? state.feedMatches : state.matches;
      const live = feed.filter(match => match.status === "live");
      const finished = feed.filter(match => match.status === "done");
      const totalGoals = finished.reduce((sum, match) => sum + numericScore(match.homeScore) + numericScore(match.awayScore), 0);
      const avgGoals = finished.length ? (totalGoals / finished.length).toFixed(1) : "0.0";
      const momentum = momentumRows(feed);
      const alerts = upsetAlerts(feed);
      return `
        <aside class="intel-panel" aria-label="实时赛事情报">
          <section class="intel-card">
            <div class="intel-head"><span>实时情报</span><span>${live.length ? "直播中" : "待命"}</span></div>
            <div class="intel-body">
              <div class="stat-grid">
                <div class="stat-tile"><strong>${live.length}</strong><span>实时比赛</span></div>
                <div class="stat-tile"><strong>${finished.length}</strong><span>已完赛</span></div>
                <div class="stat-tile"><strong>${totalGoals}</strong><span>总进球</span></div>
                <div class="stat-tile"><strong>${avgGoals}</strong><span>场均进球</span></div>
              </div>
            </div>
          </section>
          <section class="intel-card">
            <div class="intel-head"><span>比赛动量</span><span>进攻指数</span></div>
            <div class="intel-body">
              ${momentum.map(row => `
                <div class="meter-row">
                  <div class="meter-label"><span>${escapeHtml(row.label)}</span><span>${row.value}%</span></div>
                  <div class="meter"><span style="width:${row.value}%"></span></div>
                </div>
              `).join("")}
            </div>
          </section>
          <section class="intel-card">
            <div class="intel-head"><span>爆冷预警</span><span>${alerts.length}</span></div>
            <div class="intel-body">
              ${alerts.length ? alerts.map(alert => `<div class="alert-row">${escapeHtml(alert)}</div>`).join("") : `<div class="alert-row">暂未检测到明显爆冷压力。</div>`}
            </div>
          </section>
        </aside>
      `;
    }

    function momentumRows(matches) {
      const rows = teamGoalRows(matches).slice(0, 4);
      const max = Math.max(1, ...rows.map(row => row.value));
      if (!rows.length) return [{ label: "等待实时数据", value: 12 }];
      return rows.map(row => ({ label: row.label, value: Math.max(8, Math.round(row.value / max * 100)) }));
    }

    function upsetAlerts(matches) {
      return matches
        .filter(match => match.status === "done")
        .map(match => {
          const home = plainScore(match.homeScore);
          const away = plainScore(match.awayScore);
          const gap = Math.abs(home - away);
          return gap >= 2 ? `${match.stage}: ${match.home} ${home}-${away} ${match.away}` : "";
        })
        .filter(Boolean)
        .slice(0, 5);
    }

    function edgePoint(card, canvasBox, side) {
      const box = card.getBoundingClientRect();
      return {
        x: Math.round((side === "right" ? box.right : box.left) - canvasBox.left),
        y: Math.round(box.top + box.height / 2 - canvasBox.top)
      };
    }

    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        window.clearTimeout(timer);
        timer = window.setTimeout(() => fn(...args), delay);
      };
    }
    function renderStats() {
      if (!state.matches.length) {
        els.statsPanel.innerHTML = emptyState("数据统计", "赛事开始后解锁射手榜、球队进球与爆冷场次。");
        return;
      }
      const scorers = scorerRows(state.matches);
      const goals = teamGoalRows(state.matches);
      const upsets = upsetRows(state.matches);
      els.statsPanel.innerHTML = `
        <div class="stats-grid">
          <section class="stat-card"><h3>射手榜</h3>${rankList(scorers, "球")}</section>
          <section class="stat-card"><h3>球队进球</h3>${rankList(goals, "球")}</section>
          <section class="stat-card"><h3>爆冷场次</h3>${rankList(upsets, "净胜")}</section>
        </div>
      `;
    }
    function rankList(rows, suffix) {
      const safeRows = rows.length ? rows : [{ label: "等待官方数据", value: 0 }];
      const max = Math.max(1, ...safeRows.map(row => row.value));
      return `<div class="rank-list">${safeRows.map(row => `
        <div>
          <div class="rank-row"><span>${escapeHtml(row.label)}</span><strong>${escapeHtml(row.value)} ${escapeHtml(suffix)}</strong></div>
          <div class="bar"><span style="width:${Math.max(5, row.value / max * 100)}%"></span></div>
        </div>
      `).join("")}</div>`;
    }

    function scorerRows(matches) {
      const map = new Map();
      for (const match of matches) {
        for (const event of match.events) {
          if (!event.type.includes("进球") || !event.player) continue;
          const label = `${event.player} · ${event.team}`;
          map.set(label, (map.get(label) || 0) + 1);
        }
      }
      return Array.from(map, ([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value).slice(0, 8);
    }

    function teamGoalRows(matches) {
      const map = new Map();
      for (const match of matches) {
        map.set(match.home, (map.get(match.home) || 0) + numericScore(match.homeScore));
        map.set(match.away, (map.get(match.away) || 0) + numericScore(match.awayScore));
      }
      return Array.from(map, ([label, value]) => ({ label, value }))
        .filter(row => row.label !== "待定")
        .sort((a, b) => b.value - a.value)
        .slice(0, 8);
    }

    function upsetRows(matches) {
      return matches
        .filter(match => match.status === "done")
        .map(match => ({
          label: `${match.home} ${plainScore(match.homeScore)}-${plainScore(match.awayScore)} ${match.away}`,
          value: Math.abs(plainScore(match.homeScore) - plainScore(match.awayScore))
        }))
        .filter(row => row.value > 0)
        .sort((a, b) => b.value - a.value)
        .slice(0, 8);
    }

    function openDetail(match) {
      els.modalTitle.textContent = `${match.home} vs ${match.away}`;
      els.modalMeta.textContent = `${match.stage} · ${formatLocalTime(match.utcDate)} · ${match.venue} · ${match.city}`;
      els.modalBody.innerHTML = `
        <div class="match-card">
          <div class="team-row">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
          <div class="team-row">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
          <div class="score-detail">${escapeHtml(scoreDetail(match))}</div>
          <div class="venue">状态：${statusText(match.status)}</div>
          <div class="match-actions">${liveLink(match)}</div>
        </div>

      els.modal.classList.add("show");

    function renderAiPanel(match, analysis, errorMessage) {
      const cached = analysis || readAiCache(match.id);
      const disabled = match.placeholder || !/^\d+$/.test(match.id);
      const total = cached?.total ? `${cached.total.home ?? 0} : ${cached.total.away ?? 0}` : "-- : --";
      const conclusion = cached?.conclusion || (disabled
        ? "官方淘汰赛 matchId 生成后，可在这里拉取 DeepSeek 量化分析。"
        : "已接入 ai-analysis Netlify 函数，可生成阵容评分、对位、近况复盘和胜负结论。");
      const matchup = cached?.matchup || "预置字段：全线对位、绝对优势线、比赛节奏与风险点。";
      const reviewHome = cached?.review?.home || `${match.home} 近 3 场复盘将在官方数据同步后展示。`;
      const reviewAway = cached?.review?.away || `${match.away} 近 3 场复盘将在官方数据同步后展示。`;
      const buttonText = cached ? "刷新AI分析" : disabled ? "等待比赛ID" : "生成AI分析";
      return `
        <section class="ai-panel" id="aiPanel">
          <div class="ai-head">
            <strong>AI 量化分析</strong>

          </div>
          <div class="ai-total"><span class="venue">综合评分</span><strong>${escapeHtml(total)}</strong></div>
          ${errorMessage ? `<div class="ai-box" style="margin-top:10px;border-color:rgba(255,66,97,.45)"><span>请求错误</span><p>${escapeHtml(errorMessage)}</p></div>` : ""}
          <div class="ai-grid">
            <div class="ai-box"><span>阵容与健康</span><p>${escapeHtml(lineupPreview(cached, "home") || "首发11人 + 3名关键替补，含俱乐部、位置、伤病与体能评分。")}</p></div>
            <div class="ai-box"><span>客队阵容</span><p>${escapeHtml(lineupPreview(cached, "away") || "客队首发、替补深度、黄牌风险与体能消耗将在此处展示。")}</p></div>
            <div class="ai-box"><span>全线对位</span><p>${escapeHtml(matchup)}</p></div>
            <div class="ai-box"><span>近期复盘</span><p>${escapeHtml(`${reviewHome} ${reviewAway}`)}</p></div>

    async function loadAiAnalysis(matchId) {
      const match = state.bracketSlots.find(item => item.id === matchId) || state.matches.find(item => item.id === matchId);
      if (!match || match.placeholder) return;
      const panel = document.querySelector("#aiPanel");
      if (panel) panel.innerHTML = `<div class="ai-head"><strong>AI 量化分析</strong><button class="ai-action" type="button" disabled>生成中...</button></div><div class="ai-box" style="margin-top:12px"><span>DeepSeek</span><p>正在读取单场详情、两队近3场完赛数据并生成紧凑 JSON。</p></div>`;
      try {
        const url = new URL(AI_URL, window.location.href);
        url.searchParams.set("matchId", matchId);
        const response = await fetch(url.toString(), { cache: "no-store" });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok === false) {
          const error = new Error(payload.error || `AI 分析请求失败，HTTP ${response.status}`);
          error.status = response.status;
          error.detail = payload.detail || payload;
          throw error;
        }
        const analysis = payload;
        writeAiCache(matchId, analysis);
        if (panel) panel.outerHTML = renderAiPanel(match, analysis);
        showToast("AI 分析已生成。");
      } catch (error) {
        console.error("AI analysis failed", {
          matchId,
          message: error?.message,
          status: error?.status,
          detail: error?.detail,
          error
        });
        const message = error?.message || "AI 分析暂时不可用。";
        if (panel) panel.outerHTML = renderAiPanel(match, readAiCache(matchId), message);
        showToast(message);
      }
    }

    function lineupPreview(analysis, side) {
      const rows = analysis?.lineup?.[side];
      if (!Array.isArray(rows) || !rows.length) return "";
      return rows.slice(0, 3).map(player => {
        if (typeof player === "string") return player;
        return [player.name, player.position, player.club].filter(Boolean).join(" · ");
      }).join(" / ");
    }

    function writeAiCache(matchId, payload) {
      localStorage.setItem(`${AI_CACHE_KEY}${matchId}`, JSON.stringify({ payload, expires: Date.now() + 12 * 60 * 60 * 1000 }));
    }

    function readAiCache(matchId) {
      try {
        const cached = JSON.parse(localStorage.getItem(`${AI_CACHE_KEY}${matchId}`));
        if (!cached || cached.expires < Date.now()) return null;
        return cached.payload;
      } catch {
        return null;
      }
    }

    function normalizeTeam(team) {
      const raw = team?.shortName || team?.name || "待定";
      if (["TBD", "To Be Determined", "待定"].includes(raw)) return "待定";
      return teamNames[raw] || raw;
    }

    function scoreParts(score) {
      return {
        regular: [scoreValue(score?.fullTime?.home ?? score?.regularTime?.home), scoreValue(score?.fullTime?.away ?? score?.regularTime?.away)],
        extra: [scoreValue(score?.extraTime?.home), scoreValue(score?.extraTime?.away)],
        penalties: [scoreValue(score?.penalties?.home), scoreValue(score?.penalties?.away)]
      };
    }

    function displayScore(score, side) {
      const regular = scoreValue(score?.fullTime?.[side] ?? score?.regularTime?.[side]);
      const penalty = scoreValue(score?.penalties?.[side]);
      return penalty === "-" ? regular : `${regular} (${penalty})`;
    }

    function scoreDetail(match) {
      const parts = [`常规 ${match.score.regular[0]}-${match.score.regular[1]}`];
      if (match.score.extra[0] !== "-" || match.score.extra[1] !== "-") parts.push(`加时 ${match.score.extra[0]}-${match.score.extra[1]}`);
      if (match.score.penalties[0] !== "-" || match.score.penalties[1] !== "-") parts.push(`点球 ${match.score.penalties[0]}-${match.score.penalties[1]}`);
      return parts.join(" · ");
    }

    function scoreValue(value) {
      return value === null || value === undefined ? "-" : String(value);
    }

    function numericScore(value) {
      const match = String(value).match(/^\d+/);
      return match ? Number(match[0]) : 0;
    }

    function plainScore(value) {
      return numericScore(value);
    }

    function winnerName(match) {
      if (match.winner === "HOME_TEAM") return match.home;
      if (match.winner === "AWAY_TEAM") return match.away;
      return "";
    }

    function stageIndex(name) {
      return Math.max(0, stages.findIndex(stage => stage.name === name));
    }

    function normalizeEvents(events, match) {
      return events.map((event, index) => ({
        minute: event.minute || event.time || index + 1,
        type: event.type || event.eventType || "事件",
        player: event.player?.name || event.player || "",
        team: normalizeTeam(event.team) || match.homeTeam?.shortName || ""
      }));
    }

    function formatLocalTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZoneName: "short",
        timeZone: selectedTimeZone()
      }).format(date);
    }

    function shortTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "待定";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: selectedTimeZone()
      }).format(date);
    }

    function formatLocalDay(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "short",
        timeZone: selectedTimeZone()
      }).format(date);
    }

    function localTimezone() {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || "本地时区";
    }

    function selectedTimeZone() {
      return state.timeZone === "local" ? localTimezone() : state.timeZone;
    }

    function timeZoneLabel() {
      const option = els.tzSelect?.selectedOptions?.[0];
      return option?.textContent || selectedTimeZone();
    }

    function updateTimestamp(fromCache) {
      const label = state.lastUpdated ? formatLocalTime(state.lastUpdated) : "尚未同步";
      els.updatedAt.textContent = `最后更新时间：${label}（${timeZoneLabel()}${fromCache ? " · 缓存" : ""}）`;
    }

    function setNetwork(type, text) {
      els.netDot.className = `dot ${type === "ok" ? "ok" : type === "bad" ? "bad" : ""}`;
      els.netText.textContent = text;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.hidden = false;
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.hidden = true;
      }, 4200);
    }

    function friendlyError(error) {
      const message = String(error?.message || error || "");
      if (message.includes("429") || message.includes("限流")) return "football-data.org 接口限流，稍后会自动重试。";
      if (message.includes("FOOTBALL_DATA_TOKEN") || message.includes("FOOTBALL_DATA_KEY")) return "Netlify 环境变量 FOOTBALL_DATA_KEY 未配置。";
      return "暂时无法获取实时数据，已显示缓存或空状态。";
    }

    function writeCache(payload) {
      const cached = { payload: { ...payload, cachedAt: Date.now() }, expires: Date.now() + CACHE_TTL };
      localStorage.setItem(CACHE_KEY, JSON.stringify(cached));
    }

    function readCache(ignoreExpiry) {
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
        if (!cached) return null;
        if (!ignoreExpiry && cached.expires < Date.now()) return null;
        return cached;
      } catch {
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
