<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 美加墨世界杯淘汰赛</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --panel: #fff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --soft: #f3f4f6;
      --live: #d92d20;
      --done: #667085;
      --todo: #2563eb;
      --win: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    button { font: inherit; }

    .app {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 650;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .top-main {
      min-width: 0;
      flex: 1;
    }

    .progress-track {
      display: grid;
      grid-template-columns: repeat(6, minmax(72px, 1fr));
      gap: 6px;
      max-width: 760px;
      margin-top: 10px;
    }

    .progress-step {
      min-width: 0;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .progress-step.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    .progress-step.done {
      color: var(--win);
      background: #ecfdf3;
      border-color: #bbf7d0;
    }

    .pill,
    .btn {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
    }

    .btn {
      padding: 0 12px;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
    }

    .btn:hover { background: var(--soft); }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #98a2b3;
    }

    .dot.ok { background: #16a34a; }
    .dot.bad { background: var(--live); }

    .notice {
      display: none;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid #fed7aa;
      border-radius: 6px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 13px;
    }

    .notice.show { display: block; }

    .layout {
      display: grid;
      grid-template-columns: 310px minmax(700px, 1fr) 280px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .05);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 650;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .filter {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
    }

    .filter.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    .match-list {
      max-height: calc(100vh - 175px);
      overflow: auto;
      padding: 10px 8px 12px;
    }

    .timeline-group + .timeline-group {
      margin-top: 14px;
    }

    .timeline-date {
      position: sticky;
      top: 0;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 8px;
      margin: 0 0 8px 18px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: #f9fafb;
      color: #374151;
      font-size: 12px;
      font-weight: 650;
    }

    .timeline-items {
      position: relative;
      display: grid;
      gap: 8px;
      padding-left: 18px;
    }

    .timeline-items::before {
      content: "";
      position: absolute;
      top: 5px;
      bottom: 5px;
      left: 6px;
      width: 1px;
      background: var(--line);
    }

    .match-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .match-card + .match-card { margin-top: 6px; }
    .match-card:hover { background: #f9fafb; }

    .match-card.clickable {
      border-color: #fee2e2;
      cursor: pointer;
    }

    .match-card.clickable:hover { background: #fff5f5; }

    .timeline-node::before {
      content: "";
      position: absolute;
      top: 16px;
      left: -17px;
      width: 9px;
      height: 9px;
      border: 2px solid #d1d5db;
      border-radius: 50%;
      background: #fff;
      z-index: 2;
    }

    .timeline-node.done::before {
      border-color: #16a34a;
      background: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, .12);
    }

    .timeline-node.todo::before {
      border-color: #cbd5e1;
      background: #f8fafc;
    }

    .timeline-node.live::before {
      border-color: var(--live);
      background: var(--live);
      animation: breathe 1.4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 2px rgba(217, 45, 32, .16), 0 0 0 0 rgba(217, 45, 32, .36); }
      50% { box-shadow: 0 0 0 2px rgba(217, 45, 32, .22), 0 0 0 7px rgba(217, 45, 32, 0); }
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .stage {
      color: #374151;
      font-weight: 650;
    }

    .teams { display: grid; gap: 6px; }

    .team {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 8px;
      align-items: center;
    }

    .team-name {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .team-name span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .flag {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border: 2px solid rgba(255, 255, 255, .9);
      border-radius: 50%;
      background: #f8fafc;
      box-shadow: 0 0 0 1px rgba(17, 24, 39, .13), 0 0 10px rgba(15, 23, 42, .08);
      object-fit: cover;
    }

    .score,
    .bracket-score {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 650;
    }

    .status {
      justify-self: end;
      align-self: start;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 24px;
      padding: 0 8px 0 7px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .status.live { color: var(--live); background: #fef3f2; border-color: #fecaca; }
    .status.done { color: #15803d; background: #f0fdf4; border-color: #bbf7d0; }
    .status.todo { color: #64748b; background: #f8fafc; border-color: #e2e8f0; }
    .status.penalty { color: #b45309; background: #fffbeb; border-color: #fde68a; }

    .status-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      font-size: 11px;
      line-height: 1;
    }

    .status.live .status-dot {
      animation: breathe 1.4s ease-in-out infinite;
      border-radius: 50%;
    }

    .match-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .match-tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #475569;
      font-size: 10px;
      font-weight: 750;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .match-tag.upset {
      color: #b91c1c;
      background: #fef2f2;
      border-color: #fecaca;
    }

    .match-tag.penalty {
      color: #b45309;
      background: #fffbeb;
      border-color: #fde68a;
    }

    .match-tag.highlight {
      color: #1d4ed8;
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .bracket {
      overflow-x: auto;
      padding: 14px;
    }

    .bracket-grid {
      min-width: 1180px;
      display: grid;
      grid-template-columns: repeat(6, minmax(150px, 1fr));
      gap: 14px;
    }

    .round {
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .round h3 {
      margin: 0 0 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .bracket-match {
      position: relative;
      min-height: 104px;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .bracket-match.live { border-color: #fecaca; }

    .bracket-match::before,
    .bracket-match::after {
      content: "";
      position: absolute;
      height: 2px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .bracket-match.advanced::before {
      top: 50%;
      right: -15px;
      width: 15px;
      background: #d1d5db;
    }

    .bracket-match.advanced::after {
      right: -15px;
      width: 15px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      box-shadow: 0 0 8px rgba(245, 158, 11, .85), 0 0 16px rgba(245, 158, 11, .35);
    }

    .bracket-match.home-advanced::before,
    .bracket-match.home-advanced::after { top: 58%; }

    .bracket-match.away-advanced::before,
    .bracket-match.away-advanced::after { top: 78%; }

    .bracket-time {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .bracket-card-grid {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 46px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .bracket-side {
      min-width: 0;
      display: grid;
      gap: 5px;
      align-content: center;
      min-height: 56px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafafa;
    }

    .bracket-side.loser {
      color: #9ca3af;
      background: #f6f7f8;
      border-color: #e5e7eb;
      filter: grayscale(.25);
      opacity: .62;
    }

    .bracket-side.loser .flag {
      opacity: .55;
    }

    .bracket-side.winner {
      border-color: #f59e0b;
      background: #fffbeb;
      box-shadow: 0 0 0 1px rgba(245, 158, 11, .18), 0 0 12px rgba(245, 158, 11, .18);
    }

    .bracket-side.winner .team-name {
      color: #92400e;
      font-weight: 650;
    }

    .bracket-side.away {
      text-align: right;
    }

    .bracket-side.away .team-name {
      justify-content: flex-end;
    }

    .flow-line {
      position: absolute;
      top: 50%;
      height: 2px;
      background: #d1d5db;
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .flow-line.home {
      left: calc((100% - 46px) / 4);
      right: calc(50% + 25px);
    }

    .flow-line.away {
      left: calc(50% + 25px);
      right: calc((100% - 46px) / 4);
    }

    .flow-line.active {
      height: 3px;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      box-shadow: 0 0 9px rgba(245, 158, 11, .85), 0 0 18px rgba(245, 158, 11, .28);
      z-index: 1;
    }

    .bracket-side,
    .bracket-scoreboard {
      position: relative;
      z-index: 2;
    }

    .bracket-side-score {
      font-size: 16px;
      line-height: 1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .bracket-scoreboard {
      display: grid;
      justify-items: center;
      gap: 2px;
      color: #111827;
      font-size: 20px;
      line-height: 1;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .score-separator {
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
    }

    .bracket-status {
      color: var(--muted);
      font-size: 10px;
      font-weight: 500;
    }

    .bracket-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
      margin-top: 8px;
    }

    .bracket-tags .match-tags {
      margin-top: 0;
      justify-content: center;
    }

    .bracket-team {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 28px;
      gap: 6px;
      align-items: center;
      line-height: 22px;
      font-size: 13px;
    }

    .bracket-team .team-name { gap: 6px; }

    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .stats {
      display: grid;
      gap: 10px;
      padding: 10px;
    }

    .stat-card {
      padding: 11px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .stat-value {
      color: var(--text);
      font-size: 20px;
      line-height: 1.2;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .stat-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .stat-list {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .stat-row strong {
      color: var(--text);
      font-weight: 650;
    }

    /* Premium sports intelligence skin */
    :root {
      --bg: #050b18;
      --panel: rgba(11, 22, 43, .72);
      --line: rgba(148, 163, 184, .18);
      --text: #edf6ff;
      --muted: #8ea4bf;
      --soft: rgba(30, 58, 95, .54);
      --live: #ff3b5f;
      --done: #19f28c;
      --todo: #7b8aa0;
      --win: #19f28c;
      --amber: #fbbf24;
      --glass: rgba(10, 25, 50, .62);
    }

    body {
      background:
        radial-gradient(circle at 16% 8%, rgba(25, 242, 140, .16), transparent 26%),
        radial-gradient(circle at 82% 0%, rgba(59, 130, 246, .14), transparent 28%),
        linear-gradient(135deg, #050b18 0%, #071426 48%, #020617 100%);
      color: var(--text);
    }

    .app {
      max-width: 1680px;
    }

    .topbar {
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, .14);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(15, 23, 42, .84), rgba(8, 21, 43, .56));
      box-shadow: 0 20px 70px rgba(0, 0, 0, .28), inset 0 1px 0 rgba(255, 255, 255, .06);
      backdrop-filter: blur(16px);
    }

    h1 {
      color: #f8fbff;
      font-size: 26px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .subtitle,
    .panel-head span,
    .meta,
    .bracket-time,
    .stat-label,
    .stat-note,
    .stat-row,
    .score-separator,
    .bracket-status {
      color: var(--muted);
    }

    .progress-step,
    .pill,
    .btn,
    .filter,
    .timeline-date,
    .match-card,
    .bracket-match,
    .bracket-side,
    .stat-card,
    .panel {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .progress-step,
    .pill,
    .btn,
    .filter {
      border-color: rgba(148, 163, 184, .18);
      background: rgba(15, 23, 42, .62);
      color: #b8c7dc;
    }

    .progress-step.active,
    .filter.active {
      border-color: rgba(25, 242, 140, .68);
      background: linear-gradient(135deg, rgba(25, 242, 140, .22), rgba(14, 165, 233, .12));
      color: #eafff5;
      box-shadow: 0 0 18px rgba(25, 242, 140, .18);
    }

    .progress-step.done {
      color: #9fffd0;
      background: rgba(25, 242, 140, .12);
      border-color: rgba(25, 242, 140, .36);
    }

    .btn {
      color: #eef7ff;
    }

    .btn:hover,
    .filter:hover {
      background: rgba(30, 64, 106, .72);
    }

    .dot.ok {
      background: var(--done);
      box-shadow: 0 0 12px rgba(25, 242, 140, .72);
    }

    .dot.bad {
      background: var(--live);
      box-shadow: 0 0 12px rgba(255, 59, 95, .65);
    }

    .notice.show {
      border-color: rgba(251, 191, 36, .35);
      background: rgba(120, 53, 15, .28);
      color: #fde68a;
    }

    .panel {
      background: linear-gradient(180deg, rgba(11, 22, 43, .78), rgba(8, 18, 37, .62));
      border-color: rgba(148, 163, 184, .16);
      border-radius: 14px;
      box-shadow: 0 22px 80px rgba(0, 0, 0, .28), inset 0 1px 0 rgba(255, 255, 255, .055);
    }

    .panel-head {
      border-bottom-color: rgba(148, 163, 184, .14);
      background: linear-gradient(90deg, rgba(15, 23, 42, .72), rgba(14, 165, 233, .05));
    }

    .panel-head h2 {
      color: #f8fbff;
      text-transform: uppercase;
      letter-spacing: .045em;
    }

    .timeline-date {
      border-color: rgba(25, 242, 140, .2);
      background: rgba(5, 15, 31, .92);
      color: #b8ffdc;
      box-shadow: 0 0 16px rgba(25, 242, 140, .08);
    }

    .timeline-items::before {
      background: linear-gradient(180deg, rgba(25, 242, 140, .5), rgba(148, 163, 184, .12));
    }

    .match-card {
      border-color: rgba(148, 163, 184, .14);
      background: linear-gradient(135deg, rgba(15, 23, 42, .82), rgba(8, 21, 43, .62));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    .match-card:hover {
      background: linear-gradient(135deg, rgba(20, 38, 70, .9), rgba(8, 21, 43, .76));
      border-color: rgba(25, 242, 140, .28);
    }

    .match-card.clickable {
      border-color: rgba(255, 59, 95, .45);
      box-shadow: 0 0 18px rgba(255, 59, 95, .12);
    }

    .match-card.clickable:hover {
      background: rgba(80, 16, 34, .34);
    }

    .timeline-node.done::before {
      border-color: var(--done);
      background: var(--done);
      box-shadow: 0 0 0 3px rgba(25, 242, 140, .16), 0 0 14px rgba(25, 242, 140, .6);
    }

    .timeline-node.todo::before {
      border-color: rgba(148, 163, 184, .6);
      background: #1e293b;
    }

    .timeline-node.live::before {
      border-color: var(--live);
      background: var(--live);
      box-shadow: 0 0 16px rgba(255, 59, 95, .7);
    }

    .stage,
    .team-name,
    .stat-value {
      color: #f8fbff;
    }

    .score,
    .bracket-side-score,
    .bracket-scoreboard {
      font-family: "Arial Narrow", "Roboto Condensed", "Oswald", Impact, "Microsoft YaHei", sans-serif;
      letter-spacing: .02em;
    }

    .score {
      color: #ecfeff;
      font-size: 16px;
    }

    .flag {
      border-color: rgba(226, 232, 240, .9);
      background: rgba(15, 23, 42, .9);
      box-shadow: 0 0 0 1px rgba(25, 242, 140, .18), 0 0 14px rgba(25, 242, 140, .16);
    }

    .status.live {
      color: #ffe7ed;
      background: rgba(255, 59, 95, .16);
      border-color: rgba(255, 59, 95, .55);
      box-shadow: 0 0 14px rgba(255, 59, 95, .2);
    }

    .status.done {
      color: #d9ffe9;
      background: rgba(25, 242, 140, .12);
      border-color: rgba(25, 242, 140, .45);
    }

    .status.todo {

  <script>

    // 核心修改位置：football-data.org v4 的 WC 阶段枚举映射。

    function renderMatches() {
      const visible = state.matches.filter(match => state.filter === "all" || match.status === state.filter);
      els.count.textContent = `${state.matches.length} 场`;
      if (!visible.length) {
        els.list.innerHTML = `<div class="empty">${state.lastError || "暂无符合条件的比赛"}</div>`;
        return;
      }
      const groups = groupMatchesByDate(visible);
      els.list.innerHTML = groups.map(group => `
        <section class="timeline-group">
          <div class="timeline-date">${escapeHtml(group.date)}</div>
          <div class="timeline-items">
            ${group.matches.map(match => `
              <article class="match-card timeline-node ${statusClass(match.status)} ${match.status === "live" ? "clickable" : ""}" data-id="${escapeHtml(match.id)}">
                <div>
                  <div class="meta"><span class="stage">${escapeHtml(match.stage)}</span><span>${escapeHtml(formatTimeOnly(match.utcDate))}</span></div>
                  <div class="teams">
                    <div class="team">${teamMarkup(match.home)}<span class="score">${escapeHtml(match.homeScore)}</span></div>
                    <div class="team">${teamMarkup(match.away)}<span class="score">${escapeHtml(match.awayScore)}</span></div>
                  </div>
                  ${renderMatchTags(match)}
                </div>
                ${statusBadge(match)}
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    function groupMatchesByDate(matches) {
      const map = new Map();
      matches.forEach(match => {
        const key = formatDateGroup(match.utcDate);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(match);
      });
      return Array.from(map.entries()).map(([date, groupedMatches]) => ({ date, matches: groupedMatches }));
    }

    function formatDateGroup(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "时间待定";
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        month: "numeric",
        day: "numeric"
      }).formatToParts(date);
      const part = type => parts.find(item => item.type === type)?.value || "";
      return `${part("month")}/${part("day")}`;
    }

    function formatTimeOnly(value) {
      const date = value ? new Date(value) : null;
      if (!date || Number.isNaN(date.getTime())) return "时间待定";
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);
      const part = type => parts.find(item => item.type === type)?.value || "";
      return `${part("hour")}:${part("minute")}`;
    }

    function renderBracket() {
      els.bracket.innerHTML = bracketStages.map(stage => {
        const matches = state.matches.filter(match => match.stage === stage.name);
        return `<div class="round"><h3>${stage.name}</h3>${matches.map(renderBracketMatch).join("")}</div>`;
      }).join("");
    }

    function renderBracketMatch(match) {
      const homeWin = match.winner === "HOME_TEAM";
      const awayWin = match.winner === "AWAY_TEAM";
      const advanced = hasAdvancementLine(match);
      const flowClass = advanced && homeWin ? "home-advanced" : advanced && awayWin ? "away-advanced" : "";
      return `
        <div class="bracket-match ${statusClass(match.status)} ${advanced ? "advanced" : ""} ${flowClass}">
          <div class="bracket-time">${escapeHtml(formatBeijingTime(match.utcDate))}</div>
          <div class="bracket-card-grid">
            <span class="flow-line home ${homeWin ? "active" : ""}"></span>
            <span class="flow-line away ${awayWin ? "active" : ""}"></span>
            <div class="bracket-side home ${homeWin ? "winner" : ""} ${awayWin ? "loser" : ""}">
              ${teamMarkup(match.home)}
              <span class="bracket-side-score">${escapeHtml(match.homeScore)}</span>
            </div>
            <div class="bracket-scoreboard">
              <span>${escapeHtml(match.homeScore)}</span>
              <span class="score-separator">VS</span>
              <span>${escapeHtml(match.awayScore)}</span>
              <span class="bracket-status">${statusBadge(match, true)}</span>
            </div>
            <div class="bracket-side away ${awayWin ? "winner" : ""} ${homeWin ? "loser" : ""}">
              ${teamMarkup(match.away)}
              <span class="bracket-side-score">${escapeHtml(match.awayScore)}</span>
            </div>
          </div>
          <div class="bracket-tags">${renderMatchTags(match)}</div>
        </div>
      `;
    }

    function hasAdvancementLine(match) {
      return match.status === "done" && Boolean(match.winner) && !["季军赛", "决赛"].includes(match.stage);
    }

    function renderProgress() {
      const current = currentStageName();
      const currentIndex = bracketStages.findIndex(stage => stage.name === current);
      els.progress.innerHTML = bracketStages.map((stage, index) => {
        const done = stageMatches(stage.name).every(match => match.status === "done");
        const active = index === currentIndex;
        return `<span class="progress-step ${done ? "done" : ""} ${active ? "active" : ""}">${escapeHtml(stage.name)}</span>`;
      }).join("");
    }

    function currentStageName() {
      const unfinished = state.matches.find(match => match.status !== "done");
      if (unfinished) return unfinished.stage;
      return "决赛";
    }

    function stageMatches(stageName) {
      return state.matches.filter(match => match.stage === stageName);
    }

    function renderStats() {
      const realMatches = state.matches.filter(match => !String(match.id).startsWith("placeholder-"));
      const finished = realMatches.filter(match => match.status === "done");
      const goals = finished.reduce((sum, match) => sum + numericScore(match.homeScore) + numericScore(match.awayScore), 0);
      const avgGoals = finished.length ? (goals / finished.length).toFixed(2) : "-";
      const liveCount = realMatches.filter(match => match.status === "live").length;
      const upset = findUpsetCandidate(finished);
      const nextMatch = realMatches.find(match => match.status !== "done");

      els.stats.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">总进球</div>
          <div class="stat-value">${escapeHtml(goals)}</div>
          <div class="stat-note">已完赛 ${finished.length} 场 · 场均 ${escapeHtml(avgGoals)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">实时状态</div>
          <div class="stat-value">${escapeHtml(liveCount)}</div>
          <div class="stat-note">正在直播比赛数</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">爆冷观察</div>
          <div class="stat-value">${escapeHtml(upset.title)}</div>
          <div class="stat-note">${escapeHtml(upset.note)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">预测</div>
          <div class="stat-value">${escapeHtml(predictionLabel(nextMatch))}</div>
          <div class="stat-note">基于赛程阶段与实时状态的轻量预测视图</div>
          <div class="stat-list">
            <div class="stat-row"><span>下一场</span><strong>${escapeHtml(nextMatch ? `${nextMatch.home} vs ${nextMatch.away}` : "待定")}</strong></div>
            <div class="stat-row"><span>时间</span><strong>${escapeHtml(nextMatch ? formatBeijingTime(nextMatch.utcDate) : "时间待定")}</strong></div>
          </div>
        </div>
      `;
    }

    function numericScore(value) {
      const match = String(value).match(/^\d+/);
      return match ? Number(match[0]) : 0;
    }

    function predictionLabel(match) {
      if (!match) return "-";
      if (match.status === "live") return "LIVE EDGE";
      if (["半决赛", "季军赛", "决赛"].includes(match.stage)) return "HIGH";
      return "WATCH";
    }

    function findUpsetCandidate(matches) {
      const candidates = matches
        .map(match => ({
          match,
          margin: Math.abs(numericScore(match.homeScore) - numericScore(match.awayScore))
        }))
        .filter(item => item.margin >= 2);

      if (!candidates.length) {
        return { title: "暂无", note: "暂未出现大比分淘汰结果" };
      }

      const item = candidates.sort((a, b) => b.margin - a.margin)[0];
      const winner = item.match.winner === "HOME_TEAM" ? item.match.home : item.match.away;
      return {
        title: winner,
        note: `${item.match.stage} 净胜 ${item.margin} 球`
      };
    }

    function renderAll() {
      renderMatches();
      renderBracket();
      renderProgress();
      renderStats();

    // 核心修改位置：football-data.org v4 数据请求、错误捕获和空数据兜底。
    async function refresh() {
      setNetworkState("", "正在更新");
      hideNotice();
      try {
        const payload = await fetchFootballData();
        if (!payload.ok) throw new Error(payload.error || "football-data.org 数据请求失败。");
        const apiMatches = payload.matches || [];
        const knockoutCount = apiMatches.filter(match => footballStageMap[match.stage]).length;
        if (!knockoutCount) throw new Error("football-data.org 暂无 WC 2026 淘汰赛数据。");
        const matches = normalizeFootballMatches(apiMatches);

        state.lastError = "";
        updateMatches(matches);
        els.updatedAt.textContent = `更新于 ${formatBeijingTime(new Date())}`;
        setNetworkState("ok", "数据已同步");
      } catch (error) {
        state.lastError = friendlyError(error);
        if (!state.matches.length) updateMatches(buildCompleteBracket([]));
        showNotice(state.lastError);
        els.updatedAt.textContent = `检查于 ${formatBeijingTime(new Date())}`;
        setNetworkState("bad", "更新受限");
      }
    }

    async function fetchFootballData() {
      const url = new URL(DATA_URL, window.location.href);
      url.searchParams.set("_", Date.now());
      const response = await fetch(url.toString(), {
        cache: "no-store",
        headers: { "Cache-Control": "no-cache" }
      });
      if (response.status === 429) throw new Error("football-data.org 接口限流，请稍后重试。");
      if (!response.ok) throw new Error(`网络请求失败，HTTP ${response.status}`);
      return response.json();
    }

    function normalizeFootballMatches(matches) {
      const normalized = matches
        .filter(match => footballStageMap[match.stage])
        .map(match => ({
          id: String(match.id),
          stage: footballStageMap[match.stage],
          apiStage: match.stage,
          matchday: Number(match.matchday || 0),
          home: normalizeTeam(match.homeTeam),
          away: normalizeTeam(match.awayTeam),
          homeScore: pickScore(match.score, "home"),
          awayScore: pickScore(match.score, "away"),
          utcDate: match.utcDate,
          status: statusMap[match.status] || "todo",
          winner: match.score?.winner || null,
          hasPenalty: hasPenaltyScore(match.score)
        }))
        .sort((a, b) => {
          const stageA = stageOrder[a.stage] || 99;
          const stageB = stageOrder[b.stage] || 99;
          if (stageA !== stageB) return stageA - stageB;
          if (a.matchday !== b.matchday) return a.matchday - b.matchday;
          const timeA = Number.isNaN(new Date(a.utcDate).getTime()) ? Number.MAX_SAFE_INTEGER : new Date(a.utcDate).getTime();
          const timeB = Number.isNaN(new Date(b.utcDate).getTime()) ? Number.MAX_SAFE_INTEGER : new Date(b.utcDate).getTime();
          return timeA === timeB ? Number(a.id) - Number(b.id) : timeA - timeB;
        });

      return buildCompleteBracket(normalized);
    }

    function buildCompleteBracket(matches) {
      const complete = bracketStages.flatMap(stage => {
        const realMatches = matches.filter(match => match.stage === stage.name);
        const slots = [];
        for (let index = 0; index < stage.expected; index += 1) {
          slots.push(realMatches[index] || createPlaceholderMatch(stage.name, index));
        }
        return slots;
      });
      propagateKnownAdvancement(complete);
      return complete;
    }

    function propagateKnownAdvancement(matches) {
      propagatePairWinners(matches, "1/16决赛", "1/8决赛");
      propagatePairWinners(matches, "1/8决赛", "1/4决赛");
      propagatePairWinners(matches, "1/4决赛", "半决赛");
      propagateSemiFinals(matches);
    }

    function propagatePairWinners(matches, fromStage, toStage) {
      const from = matches.filter(match => match.stage === fromStage);
      const to = matches.filter(match => match.stage === toStage);
      to.forEach((target, index) => {
        const homeWinner = teamByOutcome(from[index * 2], "winner");
        const awayWinner = teamByOutcome(from[index * 2 + 1], "winner");
        if (homeWinner && isTbd(target.home)) target.home = homeWinner;
        if (awayWinner && isTbd(target.away)) target.away = awayWinner;
      });
    }

    function propagateSemiFinals(matches) {
      const semis = matches.filter(match => match.stage === "半决赛");
      const final = matches.find(match => match.stage === "决赛");
      const thirdPlace = matches.find(match => match.stage === "季军赛");
      if (final) {
        const firstWinner = teamByOutcome(semis[0], "winner");
        const secondWinner = teamByOutcome(semis[1], "winner");
        if (firstWinner && isTbd(final.home)) final.home = firstWinner;
        if (secondWinner && isTbd(final.away)) final.away = secondWinner;
      }
      if (thirdPlace) {
        const firstLoser = teamByOutcome(semis[0], "loser");
        const secondLoser = teamByOutcome(semis[1], "loser");
        if (firstLoser && isTbd(thirdPlace.home)) thirdPlace.home = firstLoser;
        if (secondLoser && isTbd(thirdPlace.away)) thirdPlace.away = secondLoser;
      }
    }

    function teamByOutcome(match, outcome) {
      if (!match || !match.winner || match.winner === "DRAW") return "";
      const homeWon = match.winner === "HOME_TEAM";
      if (outcome === "winner") return homeWon ? match.home : match.away;
      return homeWon ? match.away : match.home;
    }

    function isTbd(name) {
      return !name || name === "待定" || name === "TBD" || name === "To Be Determined";
    }

    function createPlaceholderMatch(stage, index) {
      return {
        id: `placeholder-${stage}-${index}`,
        stage,
        apiStage: "",
        matchday: 0,
        home: "待定",
        away: "待定",
        homeScore: "-",
        awayScore: "-",
        utcDate: "",
        status: "todo",
        winner: null,
        hasPenalty: false
      };
    }

    function normalizeTeam(team) {
      const name = team?.name || team?.shortName || "待定";
      if (name === "TBD" || name === "To Be Determined") return "待定";
      return teamNames[name] || name;
    }

    function pickScore(score, side) {
      const fullTime = score?.fullTime?.[side];
      const penalties = score?.penalties?.[side];
      const value = fullTime ?? score?.regularTime?.[side] ?? score?.halfTime?.[side];
      if (value === null || value === undefined) return "-";
      return hasPenaltyScore(score) ? `${value} (${penalties})` : value;
    }

    function hasPenaltyScore(score) {
      const home = score?.penalties?.home;
      const away = score?.penalties?.away;
      const hasPenaltyValues = Number(home) > 0 || Number(away) > 0;
      return score?.duration === "PENALTY_SHOOTOUT" || hasPenaltyValues;
    }

    function updateMatches(matches) {
      const signature = JSON.stringify(matches);
      if (signature !== state.lastSignature) {
        state.matches = matches;
        state.lastSignature = signature;
        renderAll();
      } else {
        renderMatches();
      }
    }

    function setNetworkState(type, message) {
      els.netDot.className = `dot ${type === "ok" ? "ok" : type === "bad" ? "bad" : ""}`;
      els.netText.textContent = message;
    }

    function showNotice(message) {
      els.notice.textContent = message;
      els.notice.classList.add("show");
    }

    function hideNotice() {
      els.notice.textContent = "";
      els.notice.classList.remove("show");
    }

    function friendlyError(error) {
      const message = String(error?.message || error || "");
      if (message.includes("429") || message.includes("限流")) return "football-data.org 接口限流，请 10 分钟后自动重试或稍后手动刷新。";
      if (message.includes("FOOTBALL_DATA_TOKEN") || message.includes("API_TOKEN")) return message;
      if (message.includes("本地没有配置")) return message;
      if (message.includes("Network error")) return "本地服务无法连接 football-data.org，请检查网络或代理后再刷新。";
      if (message.includes("network")) return "本地服务无法连接 football-data.org，请检查网络或代理后再刷新。";
      if (message.includes("暂无")) return message;
      return "暂时无法获取 football-data.org 数据，页面会继续保留上一次成功结果并自动重试。";
    }

    function statusLabel(status) {
      return status === "live" ? "正在直播" : status === "done" ? "已完赛" : "未开赛";
    }

    function statusClass(status) {
      return status === "live" ? "live" : status === "done" ? "done" : "todo";
    }

    function statusBadge(match, compact = false) {
      const badgeClass = match.hasPenalty ? "penalty" : statusClass(match.status);
      const icon = match.hasPenalty ? "●" : match.status === "live" ? "●" : match.status === "done" ? "✔" : "○";
      const label = match.hasPenalty ? "点球" : statusLabel(match.status);
      return `<span class="status ${badgeClass}"><i class="status-dot">${icon}</i>${compact ? "" : escapeHtml(label)}</span>`;
    }

    function renderMatchTags(match) {
      const tags = getMatchTags(match);
      if (!tags.length) return "";
      return `<div class="match-tags">${tags.map(tag => `<span class="match-tag ${tag.type}">${escapeHtml(tag.label)}</span>`).join("")}</div>`;
    }

    function getMatchTags(match) {
      const tags = [];
      const margin = Math.abs(numericScore(match.homeScore) - numericScore(match.awayScore));
      if (match.hasPenalty) tags.push({ type: "penalty", label: "PENALTY WIN" });
      if (match.status === "live") tags.push({ type: "highlight", label: "HIGHLIGHT MATCH" });
      if (match.status === "done" && margin >= 2) tags.push({ type: "upset", label: "UPSET" });
      if (!tags.length && ["半决赛", "季军赛", "决赛"].includes(match.stage)) {
        tags.push({ type: "highlight", label: "HIGHLIGHT MATCH" });
      }
      return tags;
    }

    // 核心修改位置：football-data.org 返回 utcDate，统一转换为北京时间 UTC+8。
    function formatBeijingTime(value) {
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      const parts = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);
      const part = type => parts.find(item => item.type === type)?.value || "";
      return `${part("year")}-${part("month")}-${part("day")} ${part("hour")}:${part("minute")}`;
    }

    function teamMarkup(name) {
      return `<span class="team-name">${flagSvg(name)}<span>${escapeHtml(name)}</span></span>`;
    }

    function flagSvg(name) {
      const code = flagCodes[name] || "";
      const colors = flagPalette(code);
      return `
        <svg class="flag" viewBox="0 0 30 20" role="img" aria-label="${escapeHtml(name)}国旗">
          <rect width="30" height="20" fill="${colors[0]}"></rect>
          <rect y="6.66" width="30" height="6.68" fill="${colors[1]}"></rect>
          <rect y="13.34" width="30" height="6.66" fill="${colors[2]}"></rect>
        </svg>
      `;
    }

    function flagPalette(code) {
      const palettes = {
        AR: ["#75aadb", "#fff", "#75aadb"], AU: ["#012169", "#fff", "#e4002b"], AT: ["#ed2939", "#fff", "#ed2939"],
        BE: ["#000", "#fae042", "#ed2939"], BR: ["#009b3a", "#ffdf00", "#002776"], CA: ["#d52b1e", "#fff", "#d52b1e"],
        CL: ["#fff", "#0039a6", "#d52b1e"], CN: ["#de2910", "#ffde00", "#de2910"], CO: ["#fcd116", "#003893", "#ce1126"],
        CM: ["#007a5e", "#ce1126", "#fcd116"], DE: ["#000", "#dd0000", "#ffce00"], DK: ["#c60c30", "#fff", "#c60c30"],
        EC: ["#ffdd00", "#034ea2", "#ed1c24"], EG: ["#ce1126", "#fff", "#000"], ES: ["#aa151b", "#f1bf00", "#aa151b"],
        FR: ["#0055a4", "#fff", "#ef4135"], "GB-ENG": ["#fff", "#cf142b", "#fff"], "GB-SCT": ["#0065bd", "#fff", "#0065bd"],
        "GB-WLS": ["#fff", "#d30731", "#00ad36"], GH: ["#ce1126", "#fcd116", "#006b3f"], HR: ["#f00", "#fff", "#171796"],
        IR: ["#239f40", "#fff", "#da0000"], IT: ["#009246", "#fff", "#ce2b37"], JP: ["#fff", "#bc002d", "#fff"],
        KR: ["#fff", "#cd2e3a", "#0047a0"], MA: ["#c1272d", "#006233", "#c1272d"], MX: ["#006847", "#fff", "#ce1126"],
        NG: ["#008751", "#fff", "#008751"], NL: ["#ae1c28", "#fff", "#21468b"], NO: ["#ba0c2f", "#fff", "#00205b"],
        PE: ["#d91023", "#fff", "#d91023"], PL: ["#fff", "#dc143c", "#dc143c"], PT: ["#006600", "#ff0000", "#ffcc00"],
        PY: ["#d52b1e", "#fff", "#0038a8"], QA: ["#8a1538", "#fff", "#8a1538"], RS: ["#c6363c", "#0c4076", "#fff"],
        SA: ["#006c35", "#fff", "#006c35"], SE: ["#006aa7", "#fecc00", "#006aa7"], SN: ["#00853f", "#fdef42", "#e31b23"],
        TR: ["#e30a17", "#fff", "#e30a17"], TN: ["#e70013", "#fff", "#e70013"], UA: ["#0057b7", "#ffd700", "#ffd700"],
        US: ["#b22234", "#fff", "#3c3b6e"], UY: ["#fff", "#0038a8", "#fcd116"], ZA: ["#007a4d", "#fff", "#de3831"],
        CH: ["#d52b1e", "#fff", "#d52b1e"], AE: ["#00732f", "#fff", "#000"]
      };
      return palettes[code] || ["#e5e7eb", "#f8fafc", "#d1d5db"];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    els.list.addEventListener("click", event => {
      const card = event.target.closest(".match-card");
      if (!card) return;
      const match = state.matches.find(item => item.id === card.dataset.id);
      if (match && match.status === "live") window.open(LIVE_URL, "_blank", "noopener,noreferrer");
    });

    document.querySelectorAll(".filter").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".filter").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.filter = button.dataset.filter;
        renderMatches();
      });
    });

    els.refreshBtn.addEventListener("click", refresh);
    refresh();
    state.timer = window.setInterval(refresh, REFRESH_INTERVAL);
  </script>
</body>
</html>
