<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 美加墨世界杯淘汰赛看板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06152c;
      --bg-2: #0a2140;
      --panel: rgba(9, 29, 58, .94);
      --panel-2: rgba(12, 40, 74, .88);
      --card: rgba(255, 255, 255, .075);
      --card-strong: rgba(255, 255, 255, .12);
      --line: rgba(255, 255, 255, .14);
      --line-strong: rgba(245, 198, 89, .7);
      --text: #f5f8ff;
      --muted: #9fb2cf;
      --gold: #f5c659;
      --gold-2: #ffe6a3;
      --green: #28b66f;
      --green-2: #7ee7a8;
      --live: #ff3d4f;
      --done: #65748b;
      --todo: #dbe6f8;
      --warn: #ffb84d;
      --shadow: 0 20px 56px rgba(0, 0, 0, .32);
      --radius: 14px;
    }

    [data-theme="light"] {
      color-scheme: light;
      --bg: #eef4fb;
      --bg-2: #dce8f5;
      --panel: rgba(255, 255, 255, .96);
      --panel-2: rgba(248, 251, 255, .94);
      --card: rgba(5, 24, 50, .055);
      --card-strong: rgba(5, 24, 50, .095);
      --line: rgba(6, 21, 44, .14);
      --line-strong: rgba(180, 132, 30, .72);
      --text: #071933;
      --muted: #55708d;
      --gold: #b9831e;
      --gold-2: #7a5415;
      --green: #11844f;
      --green-2: #0d6d41;
      --done: #64748b;
      --todo: #334155;
      --shadow: 0 18px 46px rgba(17, 38, 68, .14);
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% 0%, rgba(245, 198, 89, .16), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 55%, #063523);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }
    button, input { font: inherit; }
    button { color: inherit; }

    .app {
      width: min(1680px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 16px;
    }

    .brand {
      min-width: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--gold-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .pitch-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green-2);
      box-shadow: 0 0 0 5px rgba(40, 182, 111, .16);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 40px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 860px;
      margin: 9px 0 0;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .chip, .btn, .icon-btn, .search input, .select {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      backdrop-filter: blur(14px);
    }

    .chip {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
    }

    .chip strong { color: var(--text); }
    .net-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .net-dot.ok { background: var(--green-2); }
    .net-dot.bad { background: var(--live); }

    .btn, .icon-btn {
      height: 38px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      font-weight: 700;
    }
    .icon-btn {
      width: 38px;
      display: inline-grid;
      place-items: center;
      padding: 0;
    }
    .btn:hover, .icon-btn:hover, .tab:hover { transform: translateY(-1px); border-color: var(--line-strong); }
    .btn.primary { background: linear-gradient(135deg, var(--gold), #d59627); color: #101928; border-color: transparent; }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .search {
      position: relative;
      min-width: 0;
    }
    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 17px;
      height: 17px;
      transform: translateY(-50%);
      color: var(--muted);
    }
    .search input {
      width: 100%;
      height: 42px;
      padding: 0 14px 0 38px;
      border-radius: 10px;
      outline: none;
    }
    .search input:focus { border-color: var(--line-strong); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }
    .tab {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab.active {
      border-color: transparent;
      background: var(--gold);
      color: #08182f;
      font-weight: 800;
    }

    .layout {
      display: grid;
      grid-template-columns: 350px minmax(650px, 1fr) 330px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.07), transparent);
    }
    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }
    .panel-head span { color: var(--muted); font-size: 12px; }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .filter {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
    }
    .filter.active {
      background: rgba(40, 182, 111, .18);
      border-color: rgba(126, 231, 168, .55);
      color: var(--green-2);
      font-weight: 800;
    }

    .match-list, .stats, .bracket-wrap {
      padding: 14px;
    }
    .match-list {
      max-height: calc(100vh - 260px);
      min-height: 460px;
      overflow: auto;
    }
    .timeline-group + .timeline-group { margin-top: 16px; }
    .timeline-date {
      position: sticky;
      top: 0;
      z-index: 3;
      display: inline-flex;
      margin: 0 0 9px 12px;
      padding: 3px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--gold-2);
      font-size: 12px;
      font-weight: 800;
    }
    .timeline-items {
      position: relative;
      display: grid;
      gap: 10px;
      padding-left: 16px;
    }
    .timeline-items::before {
      content: "";
      position: absolute;
      left: 5px;
      top: 7px;
      bottom: 7px;
      width: 2px;
      border-radius: 999px;
      background: linear-gradient(var(--gold), var(--green));
      opacity: .45;
    }

    .match-card, .event-card, .stat-card, .special-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
    }
    .match-card {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 12px;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }
    .match-card::before {
      content: "";
      position: absolute;
      left: -16px;
      top: 18px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 5px rgba(245, 198, 89, .14);
    }
    .match-card.live { border-color: rgba(255, 61, 79, .55); background: rgba(255, 61, 79, .09); }
    .match-card.favorite { border-color: var(--line-strong); box-shadow: inset 3px 0 0 var(--gold); }
    .match-card:hover { transform: translateY(-1px); border-color: var(--line-strong); }
    .meta, .venue {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .stage { color: var(--gold-2); font-weight: 800; }
    .teams { display: grid; gap: 6px; margin: 9px 0; }
    .team-row {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .team-name {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 750;
    }
    .team-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .team-name:hover .team-popover { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .flag {
      flex: 0 0 auto;
      width: 26px;
      height: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.14);
    }
    .score { font-size: 18px; font-weight: 900; color: var(--gold-2); }
    .score.pending { color: var(--muted); }

    .status {
      align-self: start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }
    .status.live { color: #fff; background: var(--live); border-color: transparent; animation: pulse 1.5s infinite; }
    .status.done { color: #f4f6fa; background: var(--done); border-color: transparent; }
    .status.todo { color: var(--todo); background: rgba(255,255,255,.08); }
    .status.penalty { color: #08182f; background: var(--gold); border-color: transparent; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 61, 79, .36); }
      50% { box-shadow: 0 0 0 6px rgba(255, 61, 79, 0); }
    }

    .match-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .match-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .match-tag.gold { background: rgba(245,198,89,.18); color: var(--gold-2); }
    .match-tag.green { background: rgba(40,182,111,.16); color: var(--green-2); }
    .match-tag.red { background: rgba(255,61,79,.16); color: #ffb6be; }

    .bracket-wrap {
      position: relative;
      overflow: auto;
      min-height: 560px;
    }
    .bracket-grid {
      position: relative;
      min-width: 1180px;
      display: grid;
      grid-template-columns: repeat(6, minmax(170px, 1fr));
      gap: 20px;
      align-items: start;
      padding: 6px 8px 22px;
    }
    .bracket-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .round {
      position: relative;
      z-index: 2;
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .round h3 {
      position: sticky;
      top: 0;
      z-index: 4;
      margin: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--gold-2);
      font-size: 13px;
      text-align: center;
    }
    .bracket-match {
      position: relative;
      min-height: 142px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      scroll-margin: 80px;
    }
    .bracket-match.favorite { border-color: var(--line-strong); box-shadow: inset 0 0 0 1px rgba(245,198,89,.35); }
    .bracket-match.live { border-color: rgba(255,61,79,.55); }
    .bracket-time {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 11px;
    }
    .bracket-teams { display: grid; gap: 7px; }
    .bracket-side {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,.04);
    }
    .bracket-side.winner {
      border-color: rgba(245,198,89,.75);
      background: linear-gradient(135deg, rgba(245,198,89,.2), rgba(40,182,111,.13));
    }
    .bracket-side.loser { opacity: .6; }
    .score-detail {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .third-place {
      margin-top: 14px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: rgba(245,198,89,.08);
    }

    .stats {
      display: grid;
      gap: 12px;
      max-height: calc(100vh - 190px);
      overflow: auto;
    }
    .stat-section-title {
      margin: 5px 0 0;
      color: var(--gold-2);
      font-size: 13px;
      font-weight: 900;
    }
    .stat-card {
      padding: 12px;
    }
    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value {
      margin-top: 3px;
      color: var(--text);
      font-size: 24px;
      line-height: 1.1;
      font-weight: 950;
    }
    .stat-note { margin-top: 5px; color: var(--muted); font-size: 12px; }
    .rank-list { display: grid; gap: 8px; margin-top: 10px; }
    .rank-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }
    .rank-row strong { color: var(--text); }
    .bar {
      height: 8px;
      margin-top: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .bar span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--gold), var(--green)); }

    .events {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .event-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      padding: 9px;
      color: var(--muted);
      font-size: 12px;
    }
    .event-minute { color: var(--gold-2); font-weight: 900; }
    .event-card strong { color: var(--text); }

    .empty, .skeleton-wrap {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }
    .empty-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--gold-2);
      background: var(--card);
    }
    .empty strong { display: block; color: var(--text); margin-bottom: 4px; }
    .skeleton-card {
      width: 100%;
      height: 92px;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--card), var(--card-strong), var(--card));
      background-size: 220% 100%;
      animation: shimmer 1.25s infinite;
    }
    .skeleton-stack { width: 100%; display: grid; gap: 10px; }
    @keyframes shimmer { to { background-position: -220% 0; } }

    .popover-host { position: relative; }
    .team-popover {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 20;
      width: 220px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity .14s ease, transform .14s ease;
      padding: 10px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }
    .team-popover b { color: var(--text); }
    .team-popover .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .mini-stat {
      padding: 7px 4px;
      border-radius: 8px;
      background: var(--card);
      text-align: center;
    }
    .mini-stat strong { display: block; color: var(--gold-2); font-size: 14px; }

    .toast-stack {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 100;
      display: grid;
      gap: 10px;
      max-width: min(360px, calc(100vw - 36px));
    }
    .toast {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--gold);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--text);
      animation: toastIn .18s ease;
    }
    .toast.live { border-left-color: var(--live); }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } }

    @media (max-width: 1420px) {
      .layout { grid-template-columns: 340px minmax(0, 1fr); }
      .stats-panel { grid-column: 1 / -1; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); max-height: none; }
    }

    @media (max-width: 880px) {
      .app { padding: 12px; }
      .topbar, .controls, .layout { grid-template-columns: 1fr; }
      .toolbar, .tabs { justify-content: stretch; }
      .toolbar > *, .tabs > * { flex: 1 1 auto; }
      .match-list { max-height: none; min-height: 0; }
      .bracket-wrap { overflow: visible; min-height: 0; }
      .bracket-grid {
        min-width: 0;
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 0;
      }
      .bracket-lines { display: none; }
      .round h3 { position: static; }
      .stats { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .brand { padding: 14px; }
      .filters { grid-template-columns: repeat(2, 1fr); }
      .match-card { grid-template-columns: 1fr; }
      .status { justify-self: start; }
      .panel-head { align-items: flex-start; flex-direction: column; }
      .chip, .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="brand">
        <div class="eyebrow"><span class="pitch-dot"></span> World Cup 2026 Knockout Dashboard</div>
        <h1>2026 美加墨世界杯淘汰赛看板</h1>
        <p class="subtitle">实时比赛流、SVG 晋级路径、硬核与趣味统计聚合在一个轻量原生页面中，数据通过 Netlify 函数代理 football-data.org v4。</p>
      </section>
      <div class="toolbar">
        <div class="chip"><span id="netDot" class="net-dot"></span><span id="netText">等待同步</span></div>
        <div class="chip">刷新间隔 <strong>10min</strong></div>
        <button id="themeBtn" class="icon-btn" type="button" title="切换明暗主题" aria-label="切换明暗主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v2.2M12 18.8V21M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M3 12h2.2M18.8 12H21M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button id="refreshBtn" class="btn primary" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          手动刷新
        </button>
      </div>
    </header>

    <section class="controls" aria-label="筛选控制">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>

    <section class="layout">
      <aside class="panel">
        <div class="panel-head">
          <div>
            <h2>实时比赛时间轴</h2>
            <span>进球、红黄牌、换人、点球与收藏置顶</span>
          </div>
          <span id="matchCount">0 场</span>
        </div>
        <div class="filters">
          <button class="filter active" data-filter="all" type="button">全部</button>
          <button class="filter" data-filter="live" type="button">直播中</button>
          <button class="filter" data-filter="done" type="button">已结束</button>
          <button class="filter" data-filter="todo" type="button">未开赛</button>
        </div>
        <div id="matchList" class="match-list"></div>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>主淘汰赛 Bracket</h2>

    </section>
  </main>
  <div id="toastStack" class="toast-stack" aria-live="polite"></div>

  <script>
    const DATA_URL = location.protocol === "file:"
      ? "http://127.0.0.1:8765/api/fixtures"
      : "/api/fixtures";
    const REFRESH_INTERVAL = 10 * 60 * 1000;
    const CACHE_TTL = 6 * 60 * 60 * 1000;
    const TEAM_CACHE_TTL = 7 * 24 * 60 * 60 * 1000;

    const stages = [
      { key: "all", name: "全部轮次", expected: 32 },
      { key: "1/16决赛", name: "1/16决赛", expected: 16 },
      { key: "1/8决赛", name: "1/8决赛", expected: 8 },
      { key: "1/4决赛", name: "1/4决赛", expected: 4 },
      { key: "半决赛", name: "半决赛", expected: 2 },
      { key: "季军赛", name: "三四名决赛", expected: 1 },
      { key: "决赛", name: "决赛", expected: 1 }
    ];
    const bracketStages = stages.filter(stage => stage.key !== "all");
    const stageOrder = Object.fromEntries(bracketStages.map((stage, index) => [stage.key, index + 1]));
    const footballStageMap = {
      LAST_32: "1/16决赛",
      ROUND_OF_32: "1/16决赛",
      LAST_16: "1/8决赛",
      ROUND_OF_16: "1/8决赛",
      QUARTER_FINALS: "1/4决赛",
      SEMI_FINALS: "半决赛",
      THIRD_PLACE: "季军赛",
      FINAL: "决赛"
    };
    const statusMap = {
      SCHEDULED: "todo",
      TIMED: "todo",
      IN_PLAY: "live",
      PAUSED: "live",
      LIVE: "live",
      FINISHED: "done",
      AWARDED: "done",
      POSTPONED: "todo",
      SUSPENDED: "todo",
      CANCELLED: "todo"
    };
    const teamNames = {
      Argentina: "阿根廷", Australia: "澳大利亚", Austria: "奥地利", Belgium: "比利时", Brazil: "巴西",
      Cameroon: "喀麦隆", Canada: "加拿大", Chile: "智利", "China PR": "中国", Colombia: "哥伦比亚",
      Croatia: "克罗地亚", Denmark: "丹麦", Ecuador: "厄瓜多尔", Egypt: "埃及", England: "英格兰",
      France: "法国", Germany: "德国", Ghana: "加纳", Iran: "伊朗", Italy: "意大利", Japan: "日本",
      "Korea Republic": "韩国", Mexico: "墨西哥", Morocco: "摩洛哥", Netherlands: "荷兰", Nigeria: "尼日利亚",
      Norway: "挪威", Paraguay: "巴拉圭", Peru: "秘鲁", Poland: "波兰", Portugal: "葡萄牙", Qatar: "卡塔尔",
      "Saudi Arabia": "沙特阿拉伯", Scotland: "苏格兰", Senegal: "塞内加尔", Serbia: "塞尔维亚",
      "South Africa": "南非", Spain: "西班牙", Sweden: "瑞典", Switzerland: "瑞士", Tunisia: "突尼斯",
      Turkey: "土耳其", "Türkiye": "土耳其", USA: "美国", "United States": "美国", Uruguay: "乌拉圭",
      Wales: "威尔士", Ukraine: "乌克兰", "United Arab Emirates": "阿联酋"
    };
    const flagCodes = {
      阿根廷: "AR", 澳大利亚: "AU", 奥地利: "AT", 比利时: "BE", 巴西: "BR", 喀麦隆: "CM", 加拿大: "CA",
      智利: "CL", 中国: "CN", 哥伦比亚: "CO", 克罗地亚: "HR", 丹麦: "DK", 厄瓜多尔: "EC", 埃及: "EG",
      英格兰: "GB-ENG", 法国: "FR", 德国: "DE", 加纳: "GH", 伊朗: "IR", 意大利: "IT", 日本: "JP",
      韩国: "KR", 墨西哥: "MX", 摩洛哥: "MA", 荷兰: "NL", 尼日利亚: "NG", 挪威: "NO", 巴拉圭: "PY",
      秘鲁: "PE", 波兰: "PL", 葡萄牙: "PT", 卡塔尔: "QA", 沙特阿拉伯: "SA", 苏格兰: "GB-SCT",
      塞内加尔: "SN", 塞尔维亚: "RS", 南非: "ZA", 西班牙: "ES", 瑞典: "SE", 瑞士: "CH", 突尼斯: "TN",
      土耳其: "TR", 美国: "US", 乌拉圭: "UY", 威尔士: "GB-WLS", 乌克兰: "UA", 阿联酋: "AE"
    };
    const venues = [
      ["梅赛德斯-奔驰体育场", "亚特兰大"], ["BC Place", "温哥华"], ["吉列体育场", "波士顿"], ["AT&T 体育场", "达拉斯"],
      ["NRG 体育场", "休斯敦"], ["箭头体育场", "堪萨斯城"], ["SoFi 体育场", "洛杉矶"], ["硬石体育场", "迈阿密"],
      ["阿兹特克体育场", "墨西哥城"], ["大都会人寿体育场", "纽约/新泽西"], ["林肯金融球场", "费城"], ["李维斯体育场", "旧金山湾区"],
      ["流明球场", "西雅图"], ["BMO 球场", "多伦多"], ["阿克伦体育场", "瓜达拉哈拉"], ["BBVA 体育场", "蒙特雷"]
    ];

    const state = {
      matches: [],
      teams: [],
      standings: [],
      filter: "all",
      stage: "all",
      query: "",
      favorites: readJson("wc26:favorites", []),
      theme: localStorage.getItem("wc26:theme") || "dark",
      lastSignature: "",
      lastScoreSignature: "",
      loading: true,
      timer: null
    };

    const els = {
      list: document.querySelector("#matchList"),
      bracket: document.querySelector("#bracketGrid"),
      bracketWrap: document.querySelector("#bracketWrap"),
      lines: document.querySelector("#bracketLines"),
      thirdPlace: document.querySelector("#thirdPlace"),
      stats: document.querySelector("#statsPanel"),
      count: document.querySelector("#matchCount"),
      updatedAt: document.querySelector("#updatedAt"),
      netDot: document.querySelector("#netDot"),
      netText: document.querySelector("#netText"),
      refreshBtn: document.querySelector("#refreshBtn"),
      themeBtn: document.querySelector("#themeBtn"),
      tabs: document.querySelector("#stageTabs"),
      search: document.querySelector("#teamSearch"),
      toast: document.querySelector("#toastStack")
    };

    document.documentElement.dataset.theme = state.theme;
    renderShell();
    boot();

    async function boot() {
      const cached = readCache("wc26:fixtures");
      if (cached?.matches?.length) {
        state.loading = false;
        applyPayload(cached, { silent: true, fromCache: true });
        toast("已载入本地缓存，正在后台同步最新数据。");
      } else {
        renderSkeletons();
      }
      await refresh({ silent: Boolean(cached) });
      state.timer = window.setInterval(() => refresh({ silent: true }), REFRESH_INTERVAL);
    }

    function renderShell() {
      els.tabs.innerHTML = stages.map(stage => (
        `<button class="tab ${stage.key === state.stage ? "active" : ""}" data-stage="${escapeHtml(stage.key)}" type="button">${escapeHtml(stage.name)}</button>`
      )).join("");
    }

    function renderSkeletons() {
      const stack = `<div class="skeleton-stack">${Array.from({ length: 5 }, () => `<div class="skeleton-card"></div>`).join("")}</div>`;
      els.list.innerHTML = stack;
      els.bracket.innerHTML = bracketStages.map(stage => `<div class="round"><h3>${escapeHtml(stage.name)}</h3><div class="skeleton-card"></div><div class="skeleton-card"></div></div>`).join("");
      els.stats.innerHTML = stack;
    }

    async function refresh(options = {}) {
      setNetwork("sync", "正在同步");
      try {
        const payload = await fetchFootballData();
        if (!payload.ok) throw new Error(payload.error || "football-data.org 数据请求失败。");
        const knockoutCount = (payload.matches || []).filter(match => footballStageMap[match.stage]).length;
        if (!knockoutCount) throw new Error("football-data.org 暂无 2026 世界杯淘汰赛数据。");
        writeCache("wc26:fixtures", payload, CACHE_TTL);
        writeCache("wc26:teams", { teams: payload.teams || [] }, TEAM_CACHE_TTL);
        applyPayload(payload, { silent: options.silent });
        setNetwork("ok", "数据已同步");
        els.updatedAt.textContent = `更新于 ${formatLocalDateTime(new Date())}`;
        if (!options.silent) toast("赛程与比分已同步。");
      } catch (error) {
        const cached = readCache("wc26:fixtures", true);
        if (cached?.matches?.length && !state.matches.length) applyPayload(cached, { silent: true, fromCache: true });
        setNetwork("bad", "更新受限");
        toast(friendlyError(error), "live");
        if (!state.matches.length) {
          state.loading = false;
          state.matches = buildCompleteBracket([]);
          renderAll();
        }
      }
    }

    async function fetchFootballData() {
      const url = new URL(DATA_URL, window.location.href);
      url.searchParams.set("_", Date.now());
      const response = await fetch(url.toString(), { cache: "no-store", headers: { "Cache-Control": "no-cache" } });
      if (response.status === 429) throw new Error("football-data.org 接口限流，请稍后重试。");
      if (!response.ok) throw new Error(`网络请求失败，HTTP ${response.status}`);
      return response.json();
    }

    function applyPayload(payload, options = {}) {
      state.loading = false;
      state.teams = payload.teams || readCache("wc26:teams", true)?.teams || [];
      state.standings = payload.standings || [];
      const matches = normalizeFootballMatches(payload.matches || [], payload.events || []);
      const signature = JSON.stringify(matches);
      const scoreSignature = matches.filter(match => match.status === "live").map(match => `${match.id}:${match.homeScore}:${match.awayScore}`).join("|");
      if (!options.silent && state.lastScoreSignature && scoreSignature !== state.lastScoreSignature) {
        const changed = findScoreChange(state.matches, matches);
        if (changed) toast(`进球提醒：${changed.home} ${changed.homeScore} - ${changed.awayScore} ${changed.away}`, "live");
      }
      state.matches = matches;
      state.lastSignature = signature;
      state.lastScoreSignature = scoreSignature;
      renderAll();
      if (options.fromCache) els.updatedAt.textContent = "已显示本地缓存";
    }

    function normalizeFootballMatches(matches, eventList) {
      const normalized = matches
        .filter(match => footballStageMap[match.stage])
        .map((match, index) => {
          const stage = footballStageMap[match.stage];
          const venue = pickVenue(match, index);
          const home = normalizeTeam(match.homeTeam);
          const away = normalizeTeam(match.awayTeam);
          return {
            id: String(match.id || `${stage}-${index}`),
            apiStage: match.stage,
            stage,
            matchday: Number(match.matchday || 0),
            home,
            away,
            utcDate: match.utcDate || "",
            status: statusMap[match.status] || "todo",
            winner: match.score?.winner || null,
            score: scoreParts(match.score),
            homeScore: displayScore(match.score, "home"),
            awayScore: displayScore(match.score, "away"),
            hasPenalty: hasPenaltyScore(match.score),
            duration: match.score?.duration || "REGULAR",
            venue: venue[0],
            city: venue[1],
            events: normalizeEvents(match.events || eventList.filter(event => String(event.matchId) === String(match.id)), home, away)
          };
        })
        .sort(sortMatches);
      return buildCompleteBracket(normalized);
    }

    function buildCompleteBracket(matches) {
      const complete = bracketStages.flatMap(stage => {
        const realMatches = matches.filter(match => match.stage === stage.key);
        const slots = [];
        for (let index = 0; index < stage.expected; index += 1) {
          slots.push(realMatches[index] || createPlaceholderMatch(stage.key, index));
        }
        return slots;
      });
      propagateKnownAdvancement(complete);
      return complete;
    }

    function createPlaceholderMatch(stage, index) {
      const venue = venues[index % venues.length];
      return {
        id: `placeholder-${stage}-${index}`,
        apiStage: "",
        stage,
        matchday: 0,
        home: "待定",
        away: "待定",
        utcDate: "",
        status: "todo",
        winner: null,
        score: { regular: ["-", "-"], extra: ["-", "-"], penalties: ["-", "-"] },
        homeScore: "-",
        awayScore: "-",
        hasPenalty: false,
        duration: "REGULAR",
        venue: venue[0],
        city: venue[1],
        events: []
      };
    }

    function renderAll() {
      renderMatches();
      renderBracket();
      renderThirdPlace();
      renderStats();
      requestAnimationFrame(drawBracketLines);
    }

    function renderMatches() {
      const visible = filteredMatches();
      const real = state.matches.filter(match => !isPlaceholder(match));
      els.count.textContent = `${real.length || state.matches.length} 场`;
      if (!visible.length) {
        els.list.innerHTML = emptyState("没有匹配的比赛", "换个球队、城市或轮次试试。");
        return;
      }
      const groups = groupByDate(sortFavoritesFirst(visible));
      els.list.innerHTML = groups.map(group => `
        <section class="timeline-group">
          <div class="timeline-date">${escapeHtml(group.date)}</div>
          <div class="timeline-items">
            ${group.matches.map(renderMatchCard).join("")}
          </div>
        </section>
      `).join("");
    }

    function renderMatchCard(match) {
      return `
        <article class="match-card ${statusClass(match.status)} ${isFavoriteMatch(match) ? "favorite" : ""}" data-id="${escapeHtml(match.id)}">
          <div>
            <div class="meta"><span class="stage">${escapeHtml(stageLabel(match.stage))}</span><span>${escapeHtml(formatLocalDateTime(match.utcDate))}</span></div>
            <div class="teams">
              ${teamRow(match.home, match.homeScore, match, "home")}
              ${teamRow(match.away, match.awayScore, match, "away")}
            </div>
            <div class="venue">${escapeHtml(match.venue)} · ${escapeHtml(match.city)}</div>
            ${renderScoreDetail(match)}
            ${renderMatchTags(match)}
            ${renderEvents(match)}
          </div>
          <div>
            ${statusBadge(match)}
            <button class="icon-btn fav-btn" data-fav="${escapeHtml(match.home)}|${escapeHtml(match.away)}" type="button" title="收藏相关球队" aria-label="收藏相关球队" style="margin-top:8px">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="${isFavoriteMatch(match) ? "currentColor" : "none"}" aria-hidden="true"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </article>
      `;
    }

    function renderBracket() {
      const stagesToRender = bracketStages.filter(stage => state.stage === "all" || state.stage === stage.key);
      els.bracket.innerHTML = stagesToRender.map(stage => {
        const matches = state.matches.filter(match => match.stage === stage.key);
        return `<div class="round" data-stage="${escapeHtml(stage.key)}"><h3>${escapeHtml(stageLabel(stage.key))}</h3>${matches.map(renderBracketMatch).join("")}</div>`;
      }).join("");
    }

    function renderBracketMatch(match) {
      const homeWin = match.winner === "HOME_TEAM";
      const awayWin = match.winner === "AWAY_TEAM";
      return `
        <article class="bracket-match ${statusClass(match.status)} ${isFavoriteMatch(match) ? "favorite" : ""}" data-id="${escapeHtml(match.id)}" data-stage="${escapeHtml(match.stage)}" data-winner="${escapeHtml(winnerName(match))}">
          <div class="bracket-time"><span>${escapeHtml(formatLocalDateTime(match.utcDate))}</span><span>${escapeHtml(match.city)}</span></div>
          <div class="bracket-teams">
            <div class="bracket-side ${homeWin ? "winner" : ""} ${awayWin ? "loser" : ""}">${teamMarkup(match.home)}<span class="score ${match.homeScore === "-" ? "pending" : ""}">${escapeHtml(match.homeScore)}</span></div>
            <div class="bracket-side ${awayWin ? "winner" : ""} ${homeWin ? "loser" : ""}">${teamMarkup(match.away)}<span class="score ${match.awayScore === "-" ? "pending" : ""}">${escapeHtml(match.awayScore)}</span></div>
          </div>
          ${renderScoreDetail(match)}
          ${renderMatchTags(match)}
        </article>
      `;
    }

    function renderThirdPlace() {
      const match = state.matches.find(item => item.stage === "季军赛");
      if (!match) {
        els.thirdPlace.innerHTML = "";
        return;
      }
      els.thirdPlace.innerHTML = `
        <div class="special-card" style="padding:12px">
          <div class="meta"><span class="stage">三四名决赛</span><span>${escapeHtml(formatLocalDateTime(match.utcDate))}</span><span>${escapeHtml(match.venue)} · ${escapeHtml(match.city)}</span></div>
          <div class="teams" style="margin-bottom:0">
            ${teamRow(match.home, match.homeScore, match, "home")}
            ${teamRow(match.away, match.awayScore, match, "away")}
          </div>
        </div>
      `;
    }

    function renderStats() {
      const real = state.matches.filter(match => !isPlaceholder(match));
      const finished = real.filter(match => match.status === "done");
      const live = real.filter(match => match.status === "live");
      const totalGoals = finished.reduce((sum, match) => sum + num(match.score.regular[0]) + num(match.score.regular[1]), 0);
      const avg = finished.length ? (totalGoals / finished.length).toFixed(2) : "-";
      const teamTable = buildTeamTable(finished);
      const scorers = buildScorers(real);
      const upset = buildUpsets(finished);
      const halves = buildHalfDistribution(real);
      els.stats.innerHTML = `
        <div class="stat-section-title">硬核数据</div>
        <section class="stat-card"><div class="stat-label">总进球</div><div class="stat-value">${escapeHtml(totalGoals)}</div><div class="stat-note">已结束 ${finished.length} 场 · 场均 ${escapeHtml(avg)}</div></section>
        <section class="stat-card"><div class="stat-label">直播中</div><div class="stat-value">${escapeHtml(live.length)}</div><div class="stat-note">自动同步后会弹出轻量提示</div></section>
        <section class="stat-card"><div class="stat-label">射手榜</div>${rankList(scorers, "球")}</section>
        <section class="stat-card"><div class="stat-label">球队进球排行</div>${rankList(teamTable.goalsFor, "球")}</section>
        <section class="stat-card"><div class="stat-label">球队失球排行</div>${rankList(teamTable.goalsAgainst, "球")}</section>
        <div class="stat-section-title">趣味数据</div>
        <section class="stat-card"><div class="stat-label">爆冷场次排行</div>${rankList(upset, "净胜")}</section>
        <section class="stat-card"><div class="stat-label">上下半场进球分布</div>${rankList(halves, "球")}</section>
      `;
    }

    function renderEvents(match) {
      const events = match.events.length ? match.events : synthesizeEvents(match);
      if (!events.length) return "";
      return `<div class="events">${events.slice(0, 5).map(event => `
        <div class="event-card"><span class="event-minute">${escapeHtml(event.minute)}'</span><span><strong>${escapeHtml(event.type)}</strong> ${escapeHtml(event.team)} ${escapeHtml(event.player || "")}</span></div>
      `).join("")}</div>`;
    }

    function drawBracketLines() {
      const desktop = window.matchMedia("(min-width: 881px)").matches;
      els.lines.innerHTML = "";
      if (!desktop || state.stage !== "all") return;
      const wrapRect = els.bracketWrap.getBoundingClientRect();
      const cards = Array.from(els.bracket.querySelectorAll(".bracket-match"));
      els.lines.setAttribute("width", Math.ceil(els.bracket.scrollWidth));
      els.lines.setAttribute("height", Math.ceil(els.bracket.scrollHeight));
      for (const source of cards) {
        const match = state.matches.find(item => item.id === source.dataset.id);
        if (!match || !winnerName(match) || ["季军赛", "决赛"].includes(match.stage)) continue;
        const target = findNextMatch(match);
        if (!target) continue;
        const targetEl = els.bracket.querySelector(`.bracket-match[data-id="${cssEscape(target.id)}"]`);
        if (!targetEl) continue;
        const a = source.getBoundingClientRect();
        const b = targetEl.getBoundingClientRect();
        const x1 = a.right - wrapRect.left + els.bracketWrap.scrollLeft;
        const y1 = a.top + a.height / 2 - wrapRect.top + els.bracketWrap.scrollTop;
        const x2 = b.left - wrapRect.left + els.bracketWrap.scrollLeft;
        const y2 = b.top + b.height / 2 - wrapRect.top + els.bracketWrap.scrollTop;
        const mid = x1 + Math.max(24, (x2 - x1) / 2);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M${x1},${y1} C${mid},${y1} ${mid},${y2} ${x2},${y2}`);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "var(--gold)");
        path.setAttribute("stroke-width", "3");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("opacity", ".9");
        els.lines.appendChild(path);
      }
    }

    function findNextMatch(match) {
      const winner = winnerName(match);
      const nextMap = { "1/16决赛": "1/8决赛", "1/8决赛": "1/4决赛", "1/4决赛": "半决赛", "半决赛": "决赛" };
      const nextStage = nextMap[match.stage];
      if (!nextStage || !winner) return null;
      return state.matches.find(item => item.stage === nextStage && [item.home, item.away].includes(winner));
    }

    function filteredMatches() {
      return state.matches.filter(match => {
        if (state.filter !== "all" && match.status !== state.filter) return false;
        if (state.stage !== "all" && match.stage !== state.stage) return false;
        if (!state.query) return true;
        const haystack = [match.home, match.away, match.city, match.venue, match.stage, ...match.events.map(event => `${event.player} ${event.team}`)].join(" ").toLowerCase();
        return haystack.includes(state.query.toLowerCase());
      });
    }

    function sortFavoritesFirst(matches) {
      return [...matches].sort((a, b) => Number(isFavoriteMatch(b)) - Number(isFavoriteMatch(a)) || sortMatches(a, b));
    }

    function sortMatches(a, b) {
      const s = (stageOrder[a.stage] || 99) - (stageOrder[b.stage] || 99);
      if (s) return s;
      const ta = Date.parse(a.utcDate) || Number.MAX_SAFE_INTEGER;
      const tb = Date.parse(b.utcDate) || Number.MAX_SAFE_INTEGER;
      return ta - tb || String(a.id).localeCompare(String(b.id));
    }

    function groupByDate(matches) {
      const map = new Map();
      for (const match of matches) {
        const key = formatLocalDay(match.utcDate);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(match);
      }
      return Array.from(map, ([date, items]) => ({ date, matches: items }));
    }

    function teamRow(name, score, match, side) {
      return `<div class="team-row">${teamMarkup(name)}<span class="score ${score === "-" ? "pending" : ""}">${escapeHtml(score)}</span></div>`;
    }

    function teamMarkup(name) {
      return `<span class="team-name popover-host">${flagSvg(name)}<span class="team-label">${escapeHtml(name)}</span>${teamPopover(name)}</span>`;
    }

    function teamPopover(name) {
      if (isTbd(name)) return "";
      const data = teamStats(name);
      return `<span class="team-popover"><b>${escapeHtml(name)}</b><span> 本届淘汰赛基础数据</span><span class="mini-grid"><span class="mini-stat"><strong>${data.played}</strong>出场</span><span class="mini-stat"><strong>${data.goalsFor}</strong>进球</span><span class="mini-stat"><strong>${data.goalsAgainst}</strong>失球</span></span></span>`;
    }

    function teamStats(name) {
      const matches = state.matches.filter(match => !isPlaceholder(match) && [match.home, match.away].includes(name));
      return matches.reduce((acc, match) => {
        const home = match.home === name;
        acc.played += match.status === "done" ? 1 : 0;
        acc.goalsFor += num(match.score.regular[home ? 0 : 1]);
        acc.goalsAgainst += num(match.score.regular[home ? 1 : 0]);
        return acc;
      }, { played: 0, goalsFor: 0, goalsAgainst: 0 });
    }

    function statusBadge(match) {
      const cls = match.hasPenalty ? "penalty" : statusClass(match.status);
      const text = match.hasPenalty ? "点球" : match.status === "live" ? "LIVE" : match.status === "done" ? "已结束" : "未开赛";
      return `<span class="status ${cls}">${escapeHtml(text)}</span>`;
    }

    function renderScoreDetail(match) {
      if (match.status === "todo") return "";
      const { regular, extra, penalties } = match.score;
      const parts = [`常规 ${regular[0]}-${regular[1]}`];
      if (extra[0] !== "-" || extra[1] !== "-") parts.push(`加时 ${extra[0]}-${extra[1]}`);
      if (penalties[0] !== "-" || penalties[1] !== "-") parts.push(`点球 ${penalties[0]}-${penalties[1]}`);
      return `<div class="score-detail">${escapeHtml(parts.join(" · "))}</div>`;
    }

    function renderMatchTags(match) {
      const tags = [];
      if (match.status === "live") tags.push(["red", "实时进行"]);
      if (match.hasPenalty) tags.push(["gold", "点球大战"]);
      if (["半决赛", "季军赛", "决赛"].includes(match.stage)) tags.push(["gold", stageLabel(match.stage)]);
      if (isFavoriteMatch(match)) tags.push(["green", "已收藏"]);
      if (!tags.length) return "";
      return `<div class="match-tags">${tags.map(tag => `<span class="match-tag ${tag[0]}">${escapeHtml(tag[1])}</span>`).join("")}</div>`;
    }

    function scoreParts(score) {
      return {
        regular: [value(score?.fullTime?.home ?? score?.regularTime?.home), value(score?.fullTime?.away ?? score?.regularTime?.away)],
        extra: [value(score?.extraTime?.home), value(score?.extraTime?.away)],
        penalties: [value(score?.penalties?.home), value(score?.penalties?.away)]
      };
    }

    function displayScore(score, side) {
      const regular = value(score?.fullTime?.[side] ?? score?.regularTime?.[side]);
      const penalty = value(score?.penalties?.[side]);
      return penalty !== "-" ? `${regular} (${penalty})` : regular;
    }

    function hasPenaltyScore(score) {
      return score?.duration === "PENALTY_SHOOTOUT" || value(score?.penalties?.home) !== "-" || value(score?.penalties?.away) !== "-";
    }

    function normalizeTeam(team) {
      const name = team?.shortName || team?.name || "待定";
      if (["TBD", "To Be Determined"].includes(name)) return "待定";
      return teamNames[name] || name;
    }

    function normalizeEvents(events, home, away) {
      return (events || []).map((event, index) => ({
        minute: event.minute || event.time || index + 1,
        type: event.type || event.eventType || "事件",
        player: event.player?.name || event.player || "",
        team: normalizeTeam(event.team) || event.teamName || home || away
      })).sort((a, b) => Number(a.minute) - Number(b.minute));
    }

    function synthesizeEvents(match) {
      if (match.status === "todo") return [];
      const events = [];
      const homeGoals = num(match.score.regular[0]);
      const awayGoals = num(match.score.regular[1]);
      for (let i = 0; i < homeGoals; i += 1) events.push({ minute: 18 + i * 17, type: "进球", team: match.home, player: "球员待同步" });
      for (let i = 0; i < awayGoals; i += 1) events.push({ minute: 29 + i * 19, type: "进球", team: match.away, player: "球员待同步" });
      if (match.hasPenalty) events.push({ minute: 120, type: "点球大战", team: winnerName(match), player: "胜出" });
      return events.sort((a, b) => a.minute - b.minute);
    }

    function buildTeamTable(matches) {
      const table = new Map();
      const ensure = name => {
        if (!table.has(name)) table.set(name, { label: name, value: 0, against: 0 });
        return table.get(name);
      };
      for (const match of matches) {
        const home = ensure(match.home);
        const away = ensure(match.away);
        home.value += num(match.score.regular[0]);
        home.against += num(match.score.regular[1]);
        away.value += num(match.score.regular[1]);
        away.against += num(match.score.regular[0]);
      }
      const rows = Array.from(table.values()).filter(row => !isTbd(row.label));
      return {
        goalsFor: rows.map(row => ({ label: row.label, value: row.value })).sort((a, b) => b.value - a.value).slice(0, 5),
        goalsAgainst: rows.map(row => ({ label: row.label, value: row.against })).sort((a, b) => b.value - a.value).slice(0, 5)
      };
    }

    function buildScorers(matches) {
      const map = new Map();
      for (const match of matches) {
        for (const event of [...match.events, ...synthesizeEvents(match)]) {
          if (event.type.includes("进球") && event.player && event.player !== "球员待同步") {
            const key = `${event.player} · ${event.team}`;
            map.set(key, (map.get(key) || 0) + 1);
          }
        }
      }
      const rows = Array.from(map, ([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value).slice(0, 5);
      return rows.length ? rows : [{ label: "官方事件数据待同步", value: 0 }];
    }

    function buildUpsets(matches) {
      const rows = matches.map(match => ({
        label: `${match.home} ${match.score.regular[0]}-${match.score.regular[1]} ${match.away}`,
        value: Math.abs(num(match.score.regular[0]) - num(match.score.regular[1]))
      })).filter(row => row.value > 0).sort((a, b) => b.value - a.value).slice(0, 5);
      return rows.length ? rows : [{ label: "暂无爆冷样本", value: 0 }];
    }

    function buildHalfDistribution(matches) {
      const first = matches.reduce((sum, match) => sum + match.events.filter(event => event.type.includes("进球") && Number(event.minute) <= 45).length, 0);
      const second = matches.reduce((sum, match) => sum + match.events.filter(event => event.type.includes("进球") && Number(event.minute) > 45 && Number(event.minute) <= 90).length, 0);
      const extra = matches.reduce((sum, match) => sum + match.events.filter(event => event.type.includes("进球") && Number(event.minute) > 90).length, 0);
      return [{ label: "上半场", value: first }, { label: "下半场", value: second }, { label: "加时赛", value: extra }];
    }

    function rankList(rows, suffix) {
      const max = Math.max(1, ...rows.map(row => row.value));
      return `<div class="rank-list">${rows.map(row => `
        <div><div class="rank-row"><span>${escapeHtml(row.label)}</span><strong>${escapeHtml(row.value)} ${escapeHtml(suffix)}</strong></div><div class="bar"><span style="width:${Math.max(4, row.value / max * 100)}%"></span></div></div>
      `).join("")}</div>`;
    }

    function propagateKnownAdvancement(matches) {
      propagatePairWinners(matches, "1/16决赛", "1/8决赛");
      propagatePairWinners(matches, "1/8决赛", "1/4决赛");
      propagatePairWinners(matches, "1/4决赛", "半决赛");
      const semis = matches.filter(match => match.stage === "半决赛");
      const final = matches.find(match => match.stage === "决赛");
      const third = matches.find(match => match.stage === "季军赛");
      if (final) {
        setIfTbd(final, "home", teamByOutcome(semis[0], "winner"));
        setIfTbd(final, "away", teamByOutcome(semis[1], "winner"));
      }
      if (third) {
        setIfTbd(third, "home", teamByOutcome(semis[0], "loser"));
        setIfTbd(third, "away", teamByOutcome(semis[1], "loser"));
      }
    }

    function propagatePairWinners(matches, fromStage, toStage) {
      const from = matches.filter(match => match.stage === fromStage);
      const to = matches.filter(match => match.stage === toStage);
      to.forEach((target, index) => {
        setIfTbd(target, "home", teamByOutcome(from[index * 2], "winner"));
        setIfTbd(target, "away", teamByOutcome(from[index * 2 + 1], "winner"));
      });
    }

    function setIfTbd(match, side, value) {
      if (value && isTbd(match[side])) match[side] = value;
    }

    function teamByOutcome(match, outcome) {
      if (!match || !match.winner || match.winner === "DRAW") return "";
      const homeWon = match.winner === "HOME_TEAM";
      if (outcome === "winner") return homeWon ? match.home : match.away;
      return homeWon ? match.away : match.home;
    }

    function winnerName(match) {
      return teamByOutcome(match, "winner");
    }

    function pickVenue(match, index) {
      if (match.venue) return [match.venue, match.area?.name || "城市待定"];
      return venues[index % venues.length];
    }

    function flagSvg(name) {
      const colors = flagPalette(flagCodes[name] || "");
      return `<svg class="flag" viewBox="0 0 30 20" role="img" aria-label="${escapeHtml(name)}队徽"><rect width="30" height="20" fill="${colors[0]}"></rect><rect y="6.66" width="30" height="6.68" fill="${colors[1]}"></rect><rect y="13.34" width="30" height="6.66" fill="${colors[2]}"></rect></svg>`;
    }

    function flagPalette(code) {
      const palettes = {
        AR: ["#75aadb", "#fff", "#75aadb"], AU: ["#012169", "#fff", "#e4002b"], AT: ["#ed2939", "#fff", "#ed2939"], BE: ["#000", "#fae042", "#ed2939"],
        BR: ["#009b3a", "#ffdf00", "#002776"], CA: ["#d52b1e", "#fff", "#d52b1e"], CL: ["#fff", "#0039a6", "#d52b1e"], CN: ["#de2910", "#ffde00", "#de2910"],
        CO: ["#fcd116", "#003893", "#ce1126"], CM: ["#007a5e", "#ce1126", "#fcd116"], DE: ["#000", "#dd0000", "#ffce00"], DK: ["#c60c30", "#fff", "#c60c30"],
        EC: ["#ffdd00", "#034ea2", "#ed1c24"], EG: ["#ce1126", "#fff", "#000"], ES: ["#aa151b", "#f1bf00", "#aa151b"], FR: ["#0055a4", "#fff", "#ef4135"],
        "GB-ENG": ["#fff", "#cf142b", "#fff"], "GB-SCT": ["#0065bd", "#fff", "#0065bd"], "GB-WLS": ["#fff", "#d30731", "#00ad36"], GH: ["#ce1126", "#fcd116", "#006b3f"],
        HR: ["#f00", "#fff", "#171796"], IR: ["#239f40", "#fff", "#da0000"], IT: ["#009246", "#fff", "#ce2b37"], JP: ["#fff", "#bc002d", "#fff"],
        KR: ["#fff", "#cd2e3a", "#0047a0"], MA: ["#c1272d", "#006233", "#c1272d"], MX: ["#006847", "#fff", "#ce1126"], NG: ["#008751", "#fff", "#008751"],
        NL: ["#ae1c28", "#fff", "#21468b"], NO: ["#ba0c2f", "#fff", "#00205b"], PE: ["#d91023", "#fff", "#d91023"], PL: ["#fff", "#dc143c", "#dc143c"],
        PT: ["#006600", "#ff0000", "#ffcc00"], PY: ["#d52b1e", "#fff", "#0038a8"], QA: ["#8a1538", "#fff", "#8a1538"], RS: ["#c6363c", "#0c4076", "#fff"],
        SA: ["#006c35", "#fff", "#006c35"], SE: ["#006aa7", "#fecc00", "#006aa7"], SN: ["#00853f", "#fdef42", "#e31b23"], TR: ["#e30a17", "#fff", "#e30a17"],
        TN: ["#e70013", "#fff", "#e70013"], UA: ["#0057b7", "#ffd700", "#ffd700"], US: ["#b22234", "#fff", "#3c3b6e"], UY: ["#fff", "#0038a8", "#fcd116"],
        ZA: ["#007a4d", "#fff", "#de3831"], CH: ["#d52b1e", "#fff", "#d52b1e"], AE: ["#00732f", "#fff", "#000"]
      };
      return palettes[code] || ["#d7dee9", "#f8fafc", "#aab7c8"];
    }

    function formatLocalDateTime(value) {
      const date = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hour12: false }).format(date);
    }

    function formatLocalDay(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间待定";
      return new Intl.DateTimeFormat("zh-CN", { month: "long", day: "numeric", weekday: "short" }).format(date);
    }

    function stageLabel(stage) {
      return stage === "季军赛" ? "三四名决赛" : stage;
    }

    function emptyState(title, text) {
      return `<div class="empty"><div><div class="empty-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M6 12h12M12 3c3 2.6 4.5 5.6 4.5 9S15 18.4 12 21M12 3c-3 2.6-4.5 5.6-4.5 9S9 18.4 12 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div><strong>${escapeHtml(title)}</strong><span>${escapeHtml(text)}</span></div></div>`;
    }

    function setNetwork(type, text) {
      els.netDot.className = `net-dot ${type === "ok" ? "ok" : type === "bad" ? "bad" : ""}`;
      els.netText.textContent = text;
    }

    function toast(message, type = "") {
      const item = document.createElement("div");
      item.className = `toast ${type}`;
      item.textContent = message;
      els.toast.appendChild(item);
      window.setTimeout(() => item.remove(), 4200);
    }

    function friendlyError(error) {
      const message = String(error?.message || error || "");
      if (message.includes("429") || message.includes("限流")) return "football-data.org 接口限流，已保留缓存数据，请稍后重试。";
      if (message.includes("FOOTBALL_DATA_TOKEN")) return "Netlify 环境变量 FOOTBALL_DATA_TOKEN 未配置，部署后请在站点环境变量中添加。";
      if (message.includes("暂无")) return message;
      return "暂时无法获取实时数据，页面会继续使用缓存或完整占位赛程。";
    }

    function findScoreChange(oldMatches, newMatches) {
      const oldMap = new Map(oldMatches.map(match => [match.id, match]));
      return newMatches.find(match => {
        const old = oldMap.get(match.id);
        return old && match.status === "live" && (old.homeScore !== match.homeScore || old.awayScore !== match.awayScore);
      });
    }

    function isFavoriteMatch(match) {
      return state.favorites.includes(match.home) || state.favorites.includes(match.away);
    }

    function toggleFavorite(match) {
      const teams = [match.home, match.away].filter(team => !isTbd(team));
      const add = !teams.some(team => state.favorites.includes(team));
      state.favorites = add
        ? Array.from(new Set([...state.favorites, ...teams]))
        : state.favorites.filter(team => !teams.includes(team));
      localStorage.setItem("wc26:favorites", JSON.stringify(state.favorites));
      toast(add ? "已收藏相关球队，比赛会自动置顶高亮。" : "已取消收藏相关球队。");
      renderAll();
    }

    function writeCache(key, payload, ttl) {
      localStorage.setItem(key, JSON.stringify({ payload, expires: Date.now() + ttl }));
    }

    function readCache(key, ignoreExpiry = false) {
      const item = readJson(key, null);
      if (!item) return null;
      if (!ignoreExpiry && item.expires && item.expires < Date.now()) return null;
      return item.payload;
    }

    function readJson(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; }
    }

    function value(input) {
      return input === null || input === undefined ? "-" : input;
    }
    function num(input) {
      const parsed = Number.parseInt(String(input), 10);
      return Number.isFinite(parsed) ? parsed : 0;
    }
    function isTbd(name) {
      return !name || ["待定", "TBD", "To Be Determined"].includes(name);
    }
    function isPlaceholder(match) {
      return String(match.id).startsWith("placeholder-");
    }
    function statusClass(status) {
      return status === "live" ? "live" : status === "done" ? "done" : "todo";
    }
    function cssEscape(value) {
      return String(value).replaceAll("\\", "\\\\").replaceAll('"', '\\"');
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    els.refreshBtn.addEventListener("click", () => refresh({ silent: false }));
    els.themeBtn.addEventListener("click", () => {
      state.theme = state.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = state.theme;
      localStorage.setItem("wc26:theme", state.theme);
      requestAnimationFrame(drawBracketLines);
    });
    els.tabs.addEventListener("click", event => {
      const button = event.target.closest(".tab");
      if (!button) return;
      state.stage = button.dataset.stage;
      renderShell();
      renderAll();
    });
    document.querySelector(".filters").addEventListener("click", event => {
      const button = event.target.closest(".filter");
      if (!button) return;
      document.querySelectorAll(".filter").forEach(item => item.classList.remove("active"));
      button.classList.add("active");
      state.filter = button.dataset.filter;
      renderMatches();
    });
    els.search.addEventListener("input", event => {
      state.query = event.target.value.trim();
      renderMatches();
      renderBracket();
      requestAnimationFrame(drawBracketLines);
    });
    document.addEventListener("click", event => {
      const fav = event.target.closest(".fav-btn");
      if (!fav) return;
      const card = fav.closest("[data-id]");
      const match = state.matches.find(item => item.id === card?.dataset.id);
      if (match) toggleFavorite(match);
    });
    window.addEventListener("resize", () => requestAnimationFrame(drawBracketLines));
  </script>
</body>
</html>
